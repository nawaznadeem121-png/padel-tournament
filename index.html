<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>The Court Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tournament-tab { display: none; }
        .tournament-tab.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        input { 
            font-size: 16px !important; 
            touch-action: manipulation;
        }

        .active-tab-btn {
            border-bottom: 3px solid #4f46e5;
            color: #4f46e5;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-indigo-950 text-white px-4 py-3 shadow-md">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.PNG" alt="The Court Club" class="h-10 w-auto object-contain">
                <span class="font-black text-xl tracking-tighter uppercase"><span class="text-orange-200">The Court Club</span></span>
            </div>
            <div class="hidden md:block text-[10px] font-bold uppercase tracking-widest text-orange-200">
                Unleash Your Potential on the Court.
            </div>
        </div>
    </header>

    <main id="tournament-dashboard">
        <nav class="flex bg-white border-b sticky top-0 z-30 overflow-x-auto no-scrollbar shadow-sm">
            <button onclick="showTTab('setup')" id="tt-setup" class="flex-1 px-4 py-4 text-[10px] font-black uppercase transition-all">Setup</button>
            <button onclick="showTTab('groups')" id="tt-groups" class="flex-1 px-4 py-4 text-[10px] font-black uppercase transition-all">Scores</button>
            <button onclick="showTTab('rankings')" id="tt-rankings" class="flex-1 px-4 py-4 text-[10px] font-black uppercase transition-all">Standings</button>
            <button onclick="showTTab('finals')" id="tt-finals" class="flex-1 px-4 py-4 text-[10px] font-black uppercase transition-all">Finals</button>
            <button onclick="showTTab('history')" id="tt-history" class="flex-1 px-4 py-4 text-[10px] font-black uppercase transition-all">History</button>
        </nav>

        <div class="p-4 max-w-md mx-auto pb-20">
            <div id="t-setup" class="tournament-tab active">
                <h2 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Enter 12 Teams</h2>
                <div id="team-inputs" class="grid gap-2"></div>
                <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-sm tracking-widest hover:bg-green-500 transition">Lock & Start Tournament</button>
            </div>

            <div id="t-groups" class="tournament-tab">
                <div id="group-schedule" class="space-y-6"></div>
            </div>

            <div id="t-rankings" class="tournament-tab">
                <div id="leaderboard-container" class="space-y-6"></div>
                <div id="wildcard-list" class="mt-6 bg-amber-50 p-4 rounded-xl border border-amber-200"></div>
            </div>
            
            <div id="t-finals" class="tournament-tab">
                <div id="bracket-container" class="space-y-8"></div>
                <div id="archive-button-container" class="mt-10 hidden">
                    <button onclick="archiveTournament()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-xl hover:bg-indigo-500 transition uppercase tracking-widest text-sm">Complete & Archive</button>
                </div>
            </div>

            <div id="t-history" class="tournament-tab">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-xs uppercase tracking-widest">Saved Archives</h3>
                    <div class="flex gap-2">
                        <button onclick="exportDB()" class="text-[9px] bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">EXPORT</button>
                        <button onclick="document.getElementById('importFile').click()" class="text-[9px] bg-slate-200 px-3 py-1 rounded-full font-bold">IMPORT</button>
                        <input type="file" id="importFile" class="hidden" onchange="importDB(event)">
                    </div>
                </div>
                <div id="history-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        const USER_KEY = "ClubManager";
        let activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };

        const getDB = () => JSON.parse(localStorage.getItem('padelDB')) || { [USER_KEY]: { history: [], active: activeData } };
        const saveDB = (db) => localStorage.setItem('padelDB', JSON.stringify(db));

        function showTTab(tabId) {
            document.querySelectorAll('.tournament-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + tabId).classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab-btn'));
            const btn = document.getElementById('tt-' + tabId);
            if(btn) btn.classList.add('active-tab-btn');
            
            if(tabId !== 'setup') refreshUI();
            window.scrollTo(0, 0);
        }

        function sync() {
            const db = getDB();
            db[USER_KEY].active = activeData;
            saveDB(db);
        }

        function initInputs() {
            const cont = document.getElementById('team-inputs'); 
            cont.innerHTML = "";
            activeData.teams.forEach((t, i) => {
                cont.innerHTML += `<input type="text" value="${t}" onchange="activeData.teams[${i}]=this.value;sync()" placeholder="Team ${i+1}" class="w-full p-4 rounded-xl border border-slate-200 outline-none font-bold shadow-sm focus:border-indigo-400">`;
            });
        }

        function generateTournament() {
            if(activeData.teams.some(t => t.trim() === "")) {
                if(!confirm("Some team names are empty. Continue anyway?")) return;
            }
            activeData.groups = [activeData.teams.slice(0,4), activeData.teams.slice(4,8), activeData.teams.slice(8,12)];
            activeData.generated = true; 
            activeData.groupScores = {}; 
            activeData.koScores = {};
            sync(); 
            renderMatches(); 
            showTTab('groups');
        }

        function renderMatches() {
            const cont = document.getElementById('group-schedule'); if(!cont) return;
            cont.innerHTML = "";
            const pairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            activeData.groups.forEach((g, gIdx) => {
                let h = `<div class="bg-white rounded-2xl shadow-sm border mb-4 overflow-hidden"><div class="bg-indigo-900 text-white px-4 py-2 text-[10px] font-black uppercase">Group ${String.fromCharCode(65+gIdx)}</div>`;
                pairs.forEach((p, mIdx) => {
                    const s = activeData.groupScores[`g${gIdx}m${mIdx}`] || ["", ""];
                    h += `<div class="flex items-center justify-between p-3 border-b last:border-0">
                        <span class="text-[10px] font-bold w-20 truncate">${g[p[0]]||'TBD'}</span>
                        <div class="flex gap-1">
                            <input type="number" value="${s[0]}" onchange="updateGS(${gIdx},${mIdx},0,this.value)" class="w-12 h-12 text-center bg-slate-50 rounded-lg font-bold border border-transparent focus:border-indigo-300">
                            <input type="number" value="${s[1]}" onchange="updateGS(${gIdx},${mIdx},1,this.value)" class="w-12 h-12 text-center bg-slate-50 rounded-lg font-bold border border-transparent focus:border-indigo-300">
                        </div>
                        <span class="text-[10px] font-bold w-20 text-right truncate">${g[p[1]]||'TBD'}</span>
                    </div>`;
                });
                cont.innerHTML += h + `</div>`;
            });
        }

        function updateGS(g, m, t, v) {
            const k = `g${g}m${m}`; 
            if(!activeData.groupScores[k]) activeData.groupScores[k] = ["",""];
            activeData.groupScores[k][t] = v === "" ? "" : parseInt(v); 
            sync();
        }

        function refreshUI() {
            const res = calculate();
            renderTables(res);
            renderBracket(res.qual);
            renderHistory();
        }

        function calculate() {
            let gStats = []; let thirds = [];
            activeData.groups.forEach((g, i) => {
                let stats = g.map(name => ({ name, p: 0, gd: 0 }));
                [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach((p, m) => {
                    const s = activeData.groupScores[`g${i}m${m}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        stats[p[0]].gd += (s[0]-s[1]); stats[p[1]].gd += (s[1]-s[0]);
                        if(s[0]>s[1]) stats[p[0]].p += 2; else if(s[1]>s[0]) stats[p[1]].p += 2;
                    }
                });
                stats.sort((a,b) => b.p - a.p || b.gd - a.gd);
                gStats.push(stats); 
                thirds.push({...stats[2], g: String.fromCharCode(65+i)});
            });
            thirds.sort((a,b) => b.p - a.p || b.gd - a.gd);
            const wc = thirds.slice(0,2);
            return { gStats, wc, qual: { 
                QF1: [gStats[0][0].name, wc[1].name], QF2: [gStats[1][0].name, wc[0].name], 
                QF3: [gStats[2][0].name, gStats[0][1].name], QF4: [gStats[1][1].name, gStats[2][1].name] 
            }};
        }

        function renderTables(res) {
            const cont = document.getElementById('leaderboard-container'); if(!cont) return;
            cont.innerHTML = "";
            res.gStats.forEach((s, i) => {
                let h = `<div class="bg-white p-4 rounded-xl shadow-sm border mb-4"><h3 class="font-black text-[10px] text-indigo-600 mb-2 uppercase">Group ${String.fromCharCode(65+i)} Standings</h3><table class="w-full text-xs">`;
                s.forEach((t, idx) => h += `<tr class="${idx<2?'font-bold text-green-600':''}"><td class="py-1">${t.name||'---'}</td><td class="text-right">${t.p}pts (${t.gd>0?'+':''}${t.gd})</td></tr>`);
                cont.innerHTML += h + `</table></div>`;
            });
            const wcCont = document.getElementById('wildcard-list');
            wcCont.innerHTML = `<h3 class="font-black text-[10px] text-amber-600 mb-2 uppercase tracking-widest text-center">Qualified Runners Up</h3>`;
            res.wc.forEach((w, i) => {
                wcCont.innerHTML += `<div class="flex justify-between text-xs font-bold py-1 px-2 border-b border-amber-100 last:border-0"><span>${i+1}. ${w.name||'---'}</span><span>${w.p}pts</span></div>`;
            });
        }

        function renderBracket(qual) {
            const wins = {};
            const cont = document.getElementById('bracket-container');
            const createMatch = (id, t1, t2, label) => {
                const s = activeData.koScores[id] || ["", ""];
                const w = (t1 && t2 && s[0] !== "" && s[1] !== "") ? (s[0]>s[1]?t1:t2) : null;
                wins[id] = w;
                return `
                <div class="mb-4">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1 ml-1">${label}</p>
                    <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                        <span class="text-[11px] font-bold truncate w-24 ${w==t1?'text-green-600':''}">${t1||'TBD'}</span>
                        <div class="flex gap-1">
                            <input type="number" value="${s[0]}" onchange="updateKS('${id}',0,this.value)" class="w-12 h-12 text-center bg-slate-50 border border-transparent rounded-lg font-bold focus:border-indigo-400">
                            <input type="number" value="${s[1]}" onchange="updateKS('${id}',1,this.value)" class="w-12 h-12 text-center bg-slate-50 border border-transparent rounded-lg font-bold focus:border-indigo-400">
                        </div>
                        <span class="text-[11px] font-bold text-right truncate w-24 ${w==t2?'text-green-600':''}">${t2||'TBD'}</span>
                    </div>
                </div>`;
            };
            
            let html = createMatch("QF1", qual.QF1[0], qual.QF1[1], "Quarter Final 1") +
                       createMatch("QF2", qual.QF2[0], qual.QF2[1], "Quarter Final 2") +
                       createMatch("QF3", qual.QF3[0], qual.QF3[1], "Quarter Final 3") +
                       createMatch("QF4", qual.QF4[0], qual.QF4[1], "Quarter Final 4");

            html += `<div class="py-4 border-t my-4"><p class="text-center text-[10px] font-black text-indigo-400 uppercase tracking-widest">Semi-Finals</p></div>`;
            html += createMatch("SF1", wins.QF1, wins.QF4, "Semi Final 1") +
                    createMatch("SF2", wins.QF2, wins.QF3, "Semi Final 2");

            html += `<div class="py-4 border-t my-4"><p class="text-center text-[10px] font-black text-amber-500 uppercase tracking-widest">The Grand Final</p></div>`;
            html += createMatch("F", wins.SF1, wins.SF2, "Championship Match");

            cont.innerHTML = html;

            const arcBtn = document.getElementById('archive-button-container');
            if(wins.F) { activeData.finalWinner = wins.F; arcBtn.classList.remove('hidden'); }
            else { arcBtn.classList.add('hidden'); }
        }

        function updateKS(id, t, v) {
            if(!activeData.koScores[id]) activeData.koScores[id] = ["",""];
            activeData.koScores[id][t] = v === "" ? "" : parseInt(v); 
            sync(); 
        }

        function archiveTournament() {
            if(!confirm("Archive this tournament and clear current scores?")) return;
            const db = getDB();
            const entry = { 
                id: Date.now(), 
                date: new Date().toLocaleString(), 
                winner: activeData.finalWinner, 
                data: JSON.parse(JSON.stringify(activeData)) 
            };
            db[USER_KEY].history.unshift(entry);
            activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };
            db[USER_KEY].active = activeData;
            saveDB(db); 
            initInputs(); 
            renderMatches(); 
            refreshUI(); 
            showTTab('history');
        }

        function renderHistory() {
            const db = getDB(); const list = document.getElementById('history-list'); if(!list) return;
            list.innerHTML = "";
            if(!db[USER_KEY].history.length) return list.innerHTML = "<p class='text-center text-xs text-slate-400 py-10'>No archived tournaments yet.</p>";
            db[USER_KEY].history.forEach(h => {
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm hover:border-indigo-300 transition";
                item.innerHTML = `
                    <div onclick="viewHistory(${h.id})" class="flex-1 cursor-pointer">
                        <p class="text-[9px] font-black text-slate-400 uppercase">${h.date}</p>
                        <p class="font-bold text-slate-800">Winner: ${h.winner}</p>
                    </div>
                    <button onclick="deleteHistory(${h.id})" class="text-xs text-red-400 font-bold p-2 hover:bg-red-50 rounded-lg">Delete</button>
                `;
                list.appendChild(item);
            });
        }

        function viewHistory(id) {
            const db = getDB(); const entry = db[USER_KEY].history.find(x => x.id === id);
            activeData = JSON.parse(JSON.stringify(entry.data));
            refreshUI(); 
            showTTab('rankings');
        }

        function deleteHistory(id) {
            if(!confirm("Permanently delete this archive?")) return;
            const db = getDB(); db[USER_KEY].history = db[USER_KEY].history.filter(x => x.id !== id);
            saveDB(db); renderHistory();
        }

        function exportDB() {
            const data = localStorage.getItem('padelDB');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = `padel_hub_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importDB(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    JSON.parse(ev.target.result); 
                    localStorage.setItem('padelDB', ev.target.result);
                    location.reload();
                } catch(e) { alert("Invalid backup file."); }
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = () => {
            const db = getDB();
            activeData = db[USER_KEY].active;
            initInputs();
            if(activeData.generated) renderMatches();
            showTTab('setup');
        };
    </script>
</body>
</html>
