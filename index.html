<script>
    let data = { size: 12, names: Array(12).fill(""), groups: [], scores: {}, ko: {}, room: null, timers: {}, courts: {}, startTime: null };
    let isGuest = false;
    const EVENT_DURATION = 3 * 60 * 60 * 1000; // 3 hours

    function setTeams(n) {
        data.size = n; data.names = Array(n).fill("");
        [12, 16, 32].forEach(s => {
            const el = document.getElementById('sz-' + s);
            if (el) el.className = (s == n) ? "py-3 rounded-xl border-2 font-bold text-orange-700 border-orange-400 bg-orange-50" : "py-3 rounded-xl border-2 font-bold text-slate-400 border-slate-200";
        });
        renderInputs();
    }

    function renderInputs() {
        document.getElementById('team-list').innerHTML = data.names.map((n, i) => `<input type="text" id="team-in-${i}" value="${n}" onchange="data.names[${i}]=this.value; save();" placeholder="Team ${i + 1}" class="w-full p-3 border rounded-xl font-bold">`).join('');
    }

    function startTourney() {
        const n = data.size / 4;
        data.groups = []; data.scores = {}; data.ko = {}; data.timers = {}; data.courts = {}; data.startTime = null;
        for (let i = 0; i < n; i++) data.groups.push(data.names.slice(i * 4, i * 4 + 4));
        showTab('groups');
        save();
    }

    // --- SYNC ENGINE (FIXED) ---

    function startLive() {
        if (!data.room) data.room = 'courtclub_' + Math.random().toString(36).substr(2, 9);
        const shareableUrl = window.location.href.split('?')[0] + '?room=' + data.room;
        
        navigator.clipboard.writeText(shareableUrl).then(() => {
            document.getElementById('live-indicator').classList.remove('hidden');
            document.getElementById('live-btn').innerText = "Link Copied!";
            listenForJoinRequests();
            save(); // Initial push
            alert("LIVE ACTIVE! Share link copied to clipboard.");
        });
    }

    async function save() {
        if (isGuest) return;
        const focusedId = document.activeElement ? document.activeElement.id : null;
        localStorage.setItem('courtclub_v6', JSON.stringify(data));
        
        if (data.room) {
            // Added headers to ensure ntfy treats the body correctly
            try {
                await fetch(`https://ntfy.sh/${data.room}`, { 
                    method: 'POST', 
                    body: JSON.stringify(data),
                    headers: { 'Title': 'Tournament Update' }
                });
            } catch (e) { console.error("Sync failed", e); }
        }
        refresh();
        if (focusedId) {
            const el = document.getElementById(focusedId);
            if (el) el.focus();
        }
    }

    function listenForJoinRequests() {
        const joinSource = new EventSource(`https://ntfy.sh/${data.room}_join/sse`);
        joinSource.onmessage = (e) => {
            const payload = JSON.parse(e.data);
            if(payload.event === 'message') save(); // Push latest data when someone joins
        };
    }

    function listenForUpdates(room) {
        const syncMsg = document.getElementById('sync-msg');
        syncMsg.classList.remove('hidden');
        
        // Signal the admin that we have joined
        fetch(`https://ntfy.sh/${room}_join`, { method: 'POST', body: 'join' });

        const eventSource = new EventSource(`https://ntfy.sh/${room}/sse`);
        eventSource.onmessage = (e) => {
            try {
                const payload = JSON.parse(e.data);
                if (payload.event === 'message' && payload.message) {
                    const incomingData = JSON.parse(payload.message);
                    if (incomingData.size) { // Validation check
                        data = incomingData;
                        localStorage.setItem('courtclub_v6', JSON.stringify(data));
                        syncMsg.classList.add('hidden');
                        refresh();
                    }
                }
            } catch (err) { console.error("Update error", err); }
        };

        eventSource.onerror = () => {
            console.log("Connection lost. Retrying...");
        };
    }

    // --- TIMER & UI ENGINE ---

    function toggleTimer(id, mins) {
        if (isGuest) return;
        if (!data.startTime) data.startTime = Date.now();
        if (!data.timers[id]) {
            data.timers[id] = { remaining: mins * 60, running: true };
        } else {
            data.timers[id].running = !data.timers[id].running;
        }
        save();
    }

    function setCourt(id, val) {
        data.courts[id] = val;
        save();
    }

    setInterval(() => {
        Object.keys(data.timers).forEach(id => {
            const t = data.timers[id];
            if (t.running && t.remaining > 0) {
                t.remaining--;
                const el = document.getElementById(`timer-${id}`);
                if (el) el.innerText = formatTime(t.remaining);
            }
        });

        if (data.startTime) {
            const elapsed = Date.now() - data.startTime;
            const remaining = Math.max(0, EVENT_DURATION - elapsed);
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            const clockEl = document.getElementById('global-countdown');
            if(clockEl) {
                clockEl.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (remaining === 0) clockEl.classList.add('text-red-500');
            }
        }
    }, 1000);

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function getMatchControlsHTML(id, mins) {
        const t = data.timers[id] || { remaining: mins * 60, running: false };
        const court = data.courts[id] || "";
        return `
            <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50">
                <select onchange="setCourt('${id}', this.value)" class="text-[10px] font-black uppercase bg-slate-100 rounded px-1 py-1 outline-none">
                    <option value="">Court</option>
                    ${[1, 2, 3, 4].map(n => `<option value="Court ${n}" ${court === 'Court ' + n ? 'selected' : ''}>Court ${n}</option>`).join('')}
                </select>
                <div class="flex items-center gap-2">
                    <span id="timer-${id}" class="text-[11px] font-mono font-black ${t.running ? 'timer-running' : 'text-slate-400'}">
                        ${formatTime(t.remaining)}
                    </span>
                    <button onclick="toggleTimer('${id}', ${mins})" class="admin-only bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-[9px] font-bold uppercase">
                        ${t.running ? 'Pause' : 'Start'}
                    </button>
                </div>
            </div>`;
    }

    function updG(g, m, t, v) {
        const k = `g${g}m${m}`; if (!data.scores[k]) data.scores[k] = ["", ""];
        data.scores[k][t] = v === "" ? "" : parseInt(v); save();
    }

    function updK(id, tIdx, v) {
        if (!data.ko[id]) data.ko[id] = ["", ""];
        data.ko[id][tIdx] = v === "" ? "" : parseInt(v); save();
    }

    function refresh() {
        if (!data.groups || !data.groups.length) return;

        let gStats = data.groups.map((g, i) => {
            let s = g.map(name => ({ name, p: 0, gd: 0 }));
            const pairs = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
            pairs.forEach((p, m) => {
                const sc = data.scores[`g${i}m${m}`];
                if (sc && sc[0] !== "" && sc[1] !== "") {
                    s[p[0]].gd += (sc[0] - sc[1]); s[p[1]].gd += (sc[1] - sc[0]);
                    if (sc[0] > sc[1]) s[p[0]].p += 3; else if (sc[1] > sc[0]) s[p[1]].p += 3; else { s[p[0]].p += 1; s[p[1]].p += 1; }
                }
            });
            return s.sort((a, b) => b.p - a.p || b.gd - a.gd);
        });

        document.getElementById('tables-container').innerHTML = gStats.map((s, i) => `
            <div class="bg-white p-4 rounded-xl border shadow-sm">
                <h3 class="font-black text-[10px] text-indigo-900 mb-2 uppercase">Group ${String.fromCharCode(65 + i)}</h3>
                <table class="w-full text-xs">
                    ${s.map((t, idx) => `<tr class="${idx < 2 ? 'qualifying-row' : ''}">
                        <td class="py-2 px-2 rounded-l-lg">${t.name || '---'}</td>
                        <td class="text-right py-2 px-2 rounded-r-lg">${t.p}pts (${t.gd})</td>
                    </tr>`).join('')}
                </table>
            </div>`).join('');

        const gPairs = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
        document.getElementById('match-list').innerHTML = data.groups.map((g, gi) => `
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="bg-indigo-900 text-white px-4 py-2 text-[10px] font-black uppercase">Group ${String.fromCharCode(65 + gi)}</div>
                ${gPairs.map((p, mi) => {
                    const mid = `g${gi}m${mi}`;
                    const s = data.scores[mid] || ["", ""];
                    return `<div class="p-3 border-b last:border-0">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold w-20 truncate">${g[p[0]] || 'TBD'}</span>
                            <div class="flex gap-1">
                                <input type="number" value="${s[0]}" oninput="updG(${gi},${mi},0,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                <input type="number" value="${s[1]}" oninput="updG(${gi},${mi},1,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                            </div>
                            <span class="text-xs font-bold w-20 text-right truncate">${g[p[1]] || 'TBD'}</span>
                        </div>
                        ${getMatchControlsHTML(mid, 20)}
                    </div>`
                }).join('')}
            </div>`).join('');

        let qual = [];
        if (data.size == 12) {
            let thirds = gStats.map((s, i) => ({ ...s[2], grp: String.fromCharCode(65 + i) })).sort((a, b) => b.p - a.p || b.gd - a.gd);
            qual = [gStats[0][0].name, gStats[1][0].name, gStats[2][0].name, gStats[0][1].name, gStats[1][1].name, gStats[2][1].name, (thirds[0] || {}).name, (thirds[1] || {}).name];
            document.getElementById('wildcard-area').classList.remove('hidden');
            document.getElementById('wildcard-list').innerHTML = thirds.map((t, i) => `
                <div class="flex justify-between items-center text-[11px] p-2 ${i < 2 ? 'wildcard-row rounded-lg' : ''} font-bold">
                    <span>Group ${t.grp}: ${t.name || '---'}</span>
                    <span>${t.p}pts (${t.gd})</span>
                </div>`).join('');
        } else {
            qual = gStats.flatMap(s => [s[0].name, s[1].name]);
            document.getElementById('wildcard-area').classList.add('hidden');
        }

        const wins = {};
        const matchHTML = (id, t1, t2, label, time) => {
            const s = data.ko[id] || ["", ""];
            const w = (s[0] !== "" && s[1] !== "" && s[0] !== s[1]) ? (s[0] > s[1] ? t1 : t2) : null;
            wins[id] = w;
            return `
            <div class="mb-4">
                <p class="text-[9px] font-black text-slate-400 uppercase mb-1 ml-1">${label}</p>
                <div class="bg-white p-3 rounded-xl border shadow-sm">
                    <div class="flex justify-between items-center">
                        <span class="text-[11px] font-bold truncate w-24 ${w == t1 ? 'text-orange-500' : ''}">${t1 || 'TBD'}</span>
                        <div class="flex gap-1">
                            <input type="number" value="${s[0]}" oninput="updK('${id}',0,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                            <input type="number" value="${s[1]}" oninput="updK('${id}',1,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                        </div>
                        <span class="text-[11px] font-bold text-right truncate w-24 ${w == t2 ? 'text-orange-500' : ''}">${t2 || 'TBD'}</span>
                    </div>
                    ${getMatchControlsHTML(id, time)}
                </div>
            </div>`;
        };

        let bh = `<p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Quarter Finals</p>`;
        bh += matchHTML("QF1", qual[0], qual[7], "QF 1", 20) + matchHTML("QF2", qual[1], qual[6], "QF 2", 20) +
            matchHTML("QF3", qual[2], qual[5], "QF 3", 20) + matchHTML("QF4", qual[3], qual[4], "QF 4", 20);
        bh += `<div class="h-px bg-slate-200 my-6"></div><p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Semi Finals</p>`;
        bh += matchHTML("SF1", wins.QF1, wins.QF4, "Semi 1", 30) + matchHTML("SF2", wins.QF2, wins.QF3, "Semi 2", 30);
        bh += `<div class="py-4 border-t-2 border-orange-200 mt-6"><p class="text-center text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4">Championship</p></div>`;
        bh += matchHTML("F", wins.SF1, wins.SF2, "Finals", 30);

        document.getElementById('bracket-container').innerHTML = bh;
        if (isGuest) {
            document.querySelectorAll('input, select').forEach(i => i.disabled = true);
            document.querySelectorAll('.admin-only').forEach(e => e.remove());
        }
    }

    function showTab(id) {
        document.querySelectorAll('.tournament-tab').forEach(t => t.classList.remove('active'));
        const target = document.getElementById('tab-' + id);
        if(target) target.classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab-btn'));
        const btn = document.getElementById('btn-' + id);
        if(btn) btn.classList.add('active-tab-btn');
        refresh();
    }

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const roomID = urlParams.get('room');
        const saved = localStorage.getItem('courtclub_v6');
        if (saved) data = JSON.parse(saved);

        if (roomID) {
            isGuest = true;
            data.room = roomID;
            document.body.classList.add('read-only');
            document.querySelectorAll('.admin-only').forEach(e => e.remove());
            document.getElementById('live-indicator').classList.remove('hidden');
            listenForUpdates(roomID);
            showTab('rankings');
        } else {
            setTeams(data.size);
            if (data.groups.length) {
                showTab('groups');
                if (data.room) {
                    document.getElementById('live-indicator').classList.remove('hidden');
                    listenForJoinRequests();
                }
            }
        }
    };
</script>
