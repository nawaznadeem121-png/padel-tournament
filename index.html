<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Court Club - Tournament - 02/05/2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Flashing Animation for Champion Name */
        @keyframes flashChampion {
            0%, 100% { opacity: 1; transform: scale(1); text-shadow: 0 0 20px rgba(251, 191, 36, 0.8); }
            50% { opacity: 0.5; transform: scale(1.05); text-shadow: 0 0 40px rgba(251, 191, 36, 1); }
        }
        .animate-champion { animation: flashChampion 0.8s ease-in-out infinite; }

        /* Confetti/Particle Animation */
        @keyframes particleFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .particle {
            position: fixed;
            top: -20px;
            width: 8px;
            height: 8px;
            border-radius: 2px;
            animation: particleFall linear infinite;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-20 overflow-x-hidden">

    <header class="bg-indigo-950 text-white p-5 shadow-lg sticky top-0 z-30">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold tracking-tight">The Court Club - Tournament - 02/05/2026 <span class="text-amber-400">Mgr</span></h1>
            <button onclick="resetTournament()" class="text-xs bg-red-900 px-3 py-1 rounded border border-red-400">Reset</button>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[68px] z-30 shadow-sm">
        <button onclick="showTab('setup')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-setup">Teams</button>
        <button onclick="showTab('groups')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-groups">Scores</button>
        <button onclick="showTab('rankings')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-rankings">Table</button>
        <button onclick="showTab('knockouts')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-knockouts">Finals</button>
        <button onclick="showTab('winner')" class="flex-1 py-3 text-lg font-bold border-b-2 border-transparent hidden text-amber-500" id="tab-winner">🏆</button>
    </nav>

    <main class="p-4 max-w-md mx-auto relative z-10">

        <section id="setup" class="tab-content active">
            <h2 class="font-bold text-lg mb-4">Register 12 Teams</h2>
            <div id="team-inputs" class="grid grid-cols-1 gap-2"></div>
            <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Start Tournament</button>
        </section>

        <section id="groups" class="tab-content">
            <div id="group-schedule" class="space-y-8"></div>
        </section>

        <section id="rankings" class="tab-content">
            <div id="leaderboard-container" class="space-y-6"></div>
            <div class="mt-8 bg-amber-50 p-4 rounded-xl border border-amber-200">
                <h3 class="font-bold text-amber-800 mb-2 italic text-sm">Wildcard Race</h3>
                <div id="wildcard-list"></div>
            </div>
        </section>

        <section id="knockouts" class="tab-content">
            <div class="space-y-8">
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-xs tracking-widest">Quarter-Finals</h3>
                    <div id="qf-bracket" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-xs tracking-widest">Semi-Finals</h3>
                    <div id="sf-bracket" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-xs tracking-widest">The Grand Final</h3>
                    <div id="f-bracket" class="space-y-3"></div>
                </div>
            </div>
        </section>

        <section id="winner" class="tab-content text-center pt-24 min-h-[70vh]">
            <div class="relative z-20">
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3">Tournament Champion</p>
                <div class="text-6xl mb-6">🏆</div>
                <div id="champion-name-display" class="text-5xl font-extrabold text-amber-500 animate-champion px-4 break-words">---</div>
                <div class="text-6xl mt-6">🏆</div>
            </div>
        </section>
    </main>

    <div id="particle-container"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('padelFinalsDB')) || {
            teams: Array(12).fill(""),
            groups: [[], [], []],
            groupScores: {}, 
            koScores: {}, 
            finalWinner: null,
            generated: false
        };

        const pairings = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600', 'border-amber-500'));
            
            // Special color for Champion Tab
            const activeTab = document.getElementById('tab-' + id);
            if(id === 'winner') {
                activeTab.classList.add('border-amber-500');
                startConfetti(); // Start celebration when tab is viewed
            } else {
                activeTab.classList.add('border-indigo-600', 'text-indigo-600');
                stopConfetti(); // Stop celebration when leaving
            }
            
            if(id === 'rankings' || id === 'knockouts') refreshData();
        }

        function init() {
            const container = document.getElementById('team-inputs');
            db.teams.forEach((name, i) => {
                container.innerHTML += `<input type="text" value="${name}" onchange="db.teams[${i}]=this.value;sync();" placeholder="Team ${i+1}" class="w-full p-3 rounded-lg border border-slate-200">`;
            });
            if(db.generated) { renderGroupMatches(); refreshData(); }
            // Check if a winner already existed on load
            if(db.finalWinner) enableChampionTab(db.finalWinner);
        }

        function sync() { localStorage.setItem('padelFinalsDB', JSON.stringify(db)); }

        function generateTournament() {
            db.groups = [db.teams.slice(0,4), db.teams.slice(4,8), db.teams.slice(8,12)];
            db.generated = true; db.finalWinner = null; db.koScores = {}; db.groupScores={}; sync(); renderGroupMatches(); showTab('groups');
        }

        function renderGroupMatches() {
            const container = document.getElementById('group-schedule');
            container.innerHTML = "";
            db.groups.forEach((group, gIdx) => {
                let html = `<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                    <div class="bg-slate-800 text-white px-4 py-2 text-xs font-bold uppercase">Group ${String.fromCharCode(65+gIdx)}</div>`;
                pairings.forEach((p, mIdx) => {
                    const s = db.groupScores[`g${gIdx}m${mIdx}`] || ["", ""];
                    html += `<div class="flex items-center justify-between p-3 border-b border-slate-50 last:border-0">
                        <span class="text-xs font-bold w-24 truncate">${group[p[0]] || 'TBD'}</span>
                        <div class="flex gap-1"><input type="number" value="${s[0]}" onchange="saveGroupScore(${gIdx},${mIdx},0,this.value)" class="w-10 h-10 text-center bg-slate-100 rounded-md font-bold">
                        <input type="number" value="${s[1]}" onchange="saveGroupScore(${gIdx},${mIdx},1,this.value)" class="w-10 h-10 text-center bg-slate-100 rounded-md font-bold"></div>
                        <span class="text-xs font-bold w-24 text-right truncate">${group[p[1]] || 'TBD'}</span>
                    </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function saveGroupScore(g, m, t, v) {
            const key = `g${g}m${m}`;
            if(!db.groupScores[key]) db.groupScores[key] = ["", ""];
            db.groupScores[key][t] = v === "" ? "" : parseInt(v);
            sync();
        }

        function refreshData() {
            const results = calculateRankings();
            renderTable(results.groupStats, results.wildcards);
            renderBracket(results.qualified);
        }

        function calculateRankings() {
            let groupStats = [];
            let wildcards = [];

            db.groups.forEach((group, gIdx) => {
                let stats = group.map(name => ({ name, p: 0, gd: 0 }));
                pairings.forEach((p, mIdx) => {
                    const s = db.groupScores[`g${gIdx}m${mIdx}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        stats[p[0]].gd += (s[0] - s[1]); stats[p[1]].gd += (s[1] - s[0]);
                        if(s[0] > s[1]) stats[p[0]].p += 2; else if(s[1] > s[0]) stats[p[1]].p += 2;
                    }
                });
                stats.sort((a, b) => b.p - a.p || b.gd - a.gd);
                groupStats.push(stats);
                wildcards.push({...stats[2], group: String.fromCharCode(65+gIdx)});
            });

            wildcards.sort((a, b) => b.p - a.p || b.gd - a.gd);
            
            return {
                groupStats,
                wildcards: wildcards.slice(0, 2),
                qualified: {
                    QF1: { t1: groupStats[0][0].name, t2: wildcards[1].name },
                    QF2: { t1: groupStats[1][0].name, t2: wildcards[0].name },
                    QF3: { t1: groupStats[2][0].name, t2: groupStats[0][1].name },
                    QF4: { t1: groupStats[1][1].name, t2: groupStats[2][1].name } 
                }
            };
        }

        function renderTable(groups, wc) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = "";
            groups.forEach((stats, i) => {
                let html = `<div class="bg-white rounded-xl shadow-sm border p-4"><h3 class="font-bold text-indigo-600 mb-2">Group ${String.fromCharCode(65+i)}</h3><table class="w-full text-xs">`;
                stats.forEach((s, idx) => {
                    html += `<tr class="border-b last:border-0 ${idx < 2 ? 'bg-green-50' : ''}"><td class="py-2 font-bold">${s.name}</td><td class="text-right">GD: ${s.gd}</td><td class="text-right font-black w-12">${s.p}pts</td></tr>`;
                });
                container.innerHTML += html + `</table></div>`;
            });
            document.getElementById('wildcard-list').innerHTML = wc.map(w => `<div class="flex justify-between text-xs font-bold text-amber-900 border-b border-amber-100 py-1"><span>${w.name} (Grp ${w.group})</span><span>${w.p}pts | GD: ${w.gd}</span></div>`).join('');
        }

        function renderBracket(q) {
            const winners = {};
            
            const renderMatch = (id, t1, t2, targetContainer) => {
                const s = db.koScores[id] || ["", ""];
                const w = (t1 && t2 && s[0] !== "" && s[1] !== "" && s[0] !== s[1]) ? (s[0] > s[1] ? t1 : t2) : "";
                winners[id] = w;
                
                targetContainer.innerHTML += `
                <div class="bg-white p-3 rounded-xl border flex items-center justify-between shadow-sm border-slate-100">
                    <div class="w-24 truncate text-[11px] font-bold ${w === t1 && w !== '' ? 'text-green-600':''}">${t1 || 'TBD'}</div>
                    <div class="flex gap-1">
                        <input type="number" value="${s[0]}" onchange="saveKoScore('${id}',0,this.value)" class="w-9 h-9 text-center bg-slate-50 border rounded font-bold text-sm">
                        <input type="number" value="${s[1]}" onchange="saveKoScore('${id}',1,this.value)" class="w-9 h-9 text-center bg-slate-50 border rounded font-bold text-sm">
                    </div>
                    <div class="w-24 truncate text-[11px] font-bold text-right ${w === t2 && w !== '' ? 'text-green-600':''}">${t2 || 'TBD'}</div>
                </div>`;
            };

            const qfC = document.getElementById('qf-bracket'); qfC.innerHTML = "";
            renderMatch("QF1", q.QF1.t1, q.QF1.t2, qfC);
            renderMatch("QF2", q.QF2.t1, q.QF2.t2, qfC);
            renderMatch("QF3", q.QF3.t1, q.QF3.t2, qfC);
            renderMatch("QF4", q.QF4.t1, q.QF4.t2, qfC);

            const sfC = document.getElementById('sf-bracket'); sfC.innerHTML = "";
            renderMatch("SF1", winners.QF1, winners.QF4, sfC);
            renderMatch("SF2", winners.QF2, winners.QF3, sfC);

            const fC = document.getElementById('f-bracket'); fC.innerHTML = "";
            renderMatch("FINAL", winners.SF1, winners.SF2, fC);

            // Handle Grand Final Winner Trigger
            if(winners.FINAL) {
                if(db.finalWinner !== winners.FINAL) {
                    db.finalWinner = winners.FINAL;
                    sync();
                    enableChampionTab(winners.FINAL);
                    showTab('winner'); // Auto-switch to celebration
                }
            } else if(db.finalWinner) {
                // Winner was removed
                db.finalWinner = null;
                sync();
                document.getElementById('tab-winner').classList.add('hidden');
            }
        }

        function saveKoScore(id, t, v) {
            if(!db.koScores[id]) db.koScores[id] = ["", ""];
            db.koScores[id][t] = v === "" ? "" : parseInt(v);
            sync(); refreshData();
        }

        function enableChampionTab(name) {
            document.getElementById('champion-name-display').innerText = name;
            document.getElementById('tab-winner').classList.remove('hidden');
        }

        // Celebration Logic (Particles)
        let particleInterval;
        function startConfetti() {
            stopConfetti(); // Reset
            const container = document.getElementById('particle-container');
            const colors = ['#f59e0b', '#22c55e', '#3b82f6', '#ef4444', '#a855f7'];
            particleInterval = setInterval(() => {
                for(let i=0; i<4; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
                    p.style.animationDuration = (Math.random() * 2 + 2) + 's'; // 2-4s fall
                    p.style.opacity = Math.random();
                    container.appendChild(p);
                    // Cleanup particle after animation
                    setTimeout(() => p.remove(), 4000);
                }
            }, 150);
        }

        function stopConfetti() {
            clearInterval(particleInterval);
            document.getElementById('particle-container').innerHTML = "";
        }

        function resetTournament() { if(confirm("Clear all tournament data?")) { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
