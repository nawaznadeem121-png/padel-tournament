<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Court Club | Professional Padel Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page-content { display: none; }
        .page-content.active { display: block; }
        .tournament-tab { display: none; }
        .tournament-tab.active { display: block; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-indigo-950 text-white sticky top-0 z-[100] shadow-xl">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3 cursor-pointer relative z-[110]" onclick="showPage('home')">
                    <img src="logo.png" alt="Logo" class="h-12 w-auto object-contain">
                    <span class="font-black text-lg md:text-xl tracking-tighter uppercase">
                        The Court <span class="text-amber-400">Club</span>
                    </span>
                </div>
                
                <div class="hidden md:flex space-x-8 text-[11px] font-bold uppercase tracking-widest">
                    <button onclick="showPage('home')" class="hover:text-amber-400 transition">Home</button>
                    <button onclick="showPage('about')" class="hover:text-amber-400 transition">About</button>
                    <button onclick="showPage('tournaments')" class="text-amber-400 hover:text-white transition">Tournaments</button>
                    <button onclick="showPage('winners')" class="hover:text-amber-400 transition">Winners</button>
                    <button onclick="showPage('rules')" class="hover:text-amber-400 transition">Rules</button>
                </div>

                <div class="md:hidden relative z-[110]">
                    <button onclick="toggleMobileMenu()" class="text-2xl p-4 -mr-4 focus:outline-none">
                        <i id="menu-icon" class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden absolute top-full left-0 w-full bg-indigo-950 border-t border-indigo-900 shadow-2xl md:hidden fade-in">
            <div class="flex flex-col p-6 space-y-6 font-bold uppercase text-xs tracking-widest">
                <button onclick="showPage('home')" class="text-left flex items-center gap-4"><i class="fas fa-home text-amber-400"></i> Home</button>
                <button onclick="showPage('about')" class="text-left flex items-center gap-4"><i class="fas fa-info-circle text-amber-400"></i> About</button>
                <button onclick="showPage('tournaments')" class="text-left text-amber-400 flex items-center gap-4"><i class="fas fa-trophy"></i> Tournaments</button>
                <button onclick="showPage('winners')" class="text-left flex items-center gap-4"><i class="fas fa-medal text-amber-400"></i> Winners</button>
                <button onclick="showPage('rules')" class="text-left flex items-center gap-4"><i class="fas fa-book text-amber-400"></i> Rules</button>
            </div>
        </div>
    </nav>

    <main id="page-home" class="page-content active fade-in">
        <section class="relative h-[60vh] flex items-center justify-center bg-indigo-900 overflow-hidden">
            <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1626244101212-39d78a147ad4?q=80&w=2070')] bg-cover bg-center"></div>
            <div class="relative z-10 text-center px-6">
                <h1 class="text-4xl md:text-6xl font-black text-white mb-4 uppercase">Elevate Your <span class="text-amber-400">Game</span></h1>
                <p class="text-indigo-100 mb-8 max-w-md mx-auto">Manage brackets, groups, and rankings with professional precision.</p>
                <button onclick="showPage('tournaments')" class="bg-amber-500 text-indigo-950 font-black px-8 py-4 rounded-full shadow-lg uppercase tracking-widest text-sm">Start Tournament</button>
            </div>
        </section>
    </main>

    <main id="page-tournaments" class="page-content fade-in">
        <div id="tournament-dashboard">
            <nav class="flex bg-white border-b sticky top-20 z-30 overflow-x-auto no-scrollbar">
                <button onclick="showTTab('setup')" id="tt-setup" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">1. Setup</button>
                <button onclick="showTTab('groups')" id="tt-groups" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">2. Scores</button>
                <button onclick="showTTab('rankings')" id="tt-rankings" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">3. Standings</button>
                <button onclick="showTTab('finals')" id="tt-finals" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">4. Finals</button>
            </nav>

            <div class="p-6 max-w-md mx-auto">
                <div id="t-setup" class="tournament-tab active">
                    <h3 class="font-black text-xs uppercase mb-4 text-slate-400">Enter 12 Teams</h3>
                    <div id="team-inputs" class="grid gap-2"></div>
                    <button onclick="generateTournament()" class="w-full mt-6 bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs">Generate Brackets</button>
                </div>

                <div id="t-groups" class="tournament-tab">
                    <div id="group-schedule" class="space-y-6"></div>
                </div>

                <div id="t-rankings" class="tournament-tab">
                    <div id="leaderboard-container" class="space-y-6"></div>
                </div>

                <div id="t-finals" class="tournament-tab">
                    <div id="qf-bracket" class="mb-8"></div>
                    <div id="sf-bracket" class="mb-8"></div>
                    <div id="f-bracket"></div>
                    <div id="archive-button-container" class="mt-10 hidden">
                        <button onclick="postWinner()" class="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-xl uppercase text-xs">Post Champion to Winners Page</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <main id="page-winners" class="page-content fade-in py-16 px-6 max-w-3xl mx-auto">
        <h2 class="text-3xl font-black text-indigo-950 uppercase italic mb-8">Hall of Fame</h2>
        <div id="winner-list" class="space-y-4">
            </div>
    </main>

    <footer class="bg-indigo-950 text-indigo-300 py-12 px-6 text-center border-t border-indigo-900 mt-20">
        <p class="text-[10px] uppercase font-black tracking-widest">&copy; 2026 The Court Club. All rights reserved.</p>
    </footer>

    <script>
        // APP DATA
        let activeData = { 
            teams: Array(12).fill(""), 
            groups: [], 
            groupScores: {}, 
            koScores: {}, 
            finalWinner: null, 
            generated: false 
        };

        // NAVIGATION ENGINE
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + pageId);
            if(target) target.classList.add('active');
            
            if(pageId === 'winners') renderWinners();
            if(pageId === 'tournaments') {
                initInputs();
                showTTab(activeData.generated ? 'groups' : 'setup');
            }

            window.scrollTo(0, 0);
            toggleMobileMenu(true);
        }

        function toggleMobileMenu(forceClose = false) {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('menu-icon');
            if(forceClose || !menu.classList.contains('hidden')) {
                menu.classList.add('hidden');
                icon.className = 'fas fa-bars';
            } else {
                menu.classList.remove('hidden');
                icon.className = 'fas fa-times';
            }
        }

        function showTTab(tabId) {
            document.querySelectorAll('.tournament-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + tabId).classList.add('active');
            document.querySelectorAll('#tournament-dashboard nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600'));
            document.getElementById('tt-' + tabId).classList.add('border-indigo-600', 'text-indigo-600');
            if(tabId !== 'setup') refreshUI();
        }

        // TOURNAMENT LOGIC
        function initInputs() {
            const cont = document.getElementById('team-inputs');
            if(cont.innerHTML === "") {
                activeData.teams.forEach((t, i) => {
                    cont.innerHTML += `<input type="text" onchange="activeData.teams[${i}]=this.value" placeholder="Team ${i+1}" class="w-full p-4 rounded-xl border border-slate-200 outline-none text-sm font-bold">`;
                });
            }
        }

        function generateTournament() {
            if(activeData.teams.some(t => t.trim() === "")) return alert("Please name all 12 teams.");
            activeData.groups = [activeData.teams.slice(0,4), activeData.teams.slice(4,8), activeData.teams.slice(8,12)];
            activeData.generated = true;
            renderMatches();
            showTTab('groups');
        }

        function renderMatches() {
            const cont = document.getElementById('group-schedule');
            cont.innerHTML = "";
            const pairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            activeData.groups.forEach((g, gIdx) => {
                let h = `<div class="bg-white rounded-2xl shadow-sm border mb-4 overflow-hidden"><div class="bg-indigo-950 text-white px-4 py-2 text-[10px] font-black">GROUP ${String.fromCharCode(65+gIdx)}</div>`;
                pairs.forEach((p, mIdx) => {
                    h += `<div class="flex items-center justify-between p-3 border-b last:border-0"><span class="text-[10px] font-bold w-20 truncate">${g[p[0]]}</span><div class="flex gap-2"><input type="number" onchange="updateGS(${gIdx},${mIdx},0,this.value)" class="w-8 h-8 text-center bg-slate-100 rounded"> <input type="number" onchange="updateGS(${gIdx},${mIdx},1,this.value)" class="w-8 h-8 text-center bg-slate-100 rounded"></div><span class="text-[10px] font-bold w-20 text-right truncate">${g[p[1]]}</span></div>`;
                });
                cont.innerHTML += h + `</div>`;
            });
        }

        function updateGS(g, m, t, v) {
            const k = `g${g}m${m}`; if(!activeData.groupScores[k]) activeData.groupScores[k] = ["",""];
            activeData.groupScores[k][t] = v === "" ? "" : parseInt(v);
        }

        // Add Logic for Standings and Bracket here as needed...
        function refreshUI() { /* Placeholder for calculation & bracket logic */ }

        function postWinner() {
            if(!activeData.finalWinner) return alert("Tournament not finished.");
            let winners = JSON.parse(localStorage.getItem('cc_winners')) || [];
            winners.unshift({ team: activeData.finalWinner, date: new Date().toLocaleDateString() });
            localStorage.setItem('cc_winners', JSON.stringify(winners));
            alert("Winner posted!");
            showPage('winners');
        }

        function renderWinners() {
            const cont = document.getElementById('winner-list');
            const data = JSON.parse(localStorage.getItem('cc_winners')) || [];
            cont.innerHTML = data.length ? "" : "<p class='text-slate-400 text-center py-10'>No champions yet.</p>";
            data.forEach(w => {
                cont.innerHTML += `<div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm"><div><p class="text-[9px] font-black text-amber-500 uppercase">${w.date}</p><h3 class="text-xl font-black text-indigo-950 uppercase">${w.team}</h3></div><div class="text-3xl">🏆</div></div>`;
            });
        }

    </script>
</body>
</html>
