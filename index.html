<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Pro Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-20">

    <header class="bg-indigo-700 text-white p-5 shadow-lg sticky top-0 z-20">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold tracking-tight">Padel Central</h1>
            <button onclick="resetTournament()" class="text-xs bg-indigo-800 px-3 py-1 rounded border border-indigo-400">Reset</button>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[68px] z-20 shadow-sm">
        <button onclick="showTab('setup')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-setup">Teams</button>
        <button onclick="showTab('groups')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-groups">Scores</button>
        <button onclick="showTab('rankings')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-rankings">Table</button>
        <button onclick="showTab('knockouts')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-knockouts">Finals</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">

        <section id="setup" class="tab-content active">
            <h2 class="font-bold text-lg mb-4">Register 12 Teams</h2>
            <div id="team-inputs" class="grid grid-cols-1 gap-2"></div>
            <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Start Tournament</button>
        </section>

        <section id="groups" class="tab-content">
            <div id="group-schedule" class="space-y-8"></div>
        </section>

        <section id="rankings" class="tab-content">
            <div id="leaderboard-container" class="space-y-6"></div>
            <div id="wildcard-container" class="mt-8 bg-amber-50 p-4 rounded-xl border border-amber-200">
                <h3 class="font-bold text-amber-800 mb-2 italic">Best 3rd Place Tracker</h3>
                <div id="wildcard-list"></div>
            </div>
        </section>

        <section id="knockouts" class="tab-content">
            <div class="space-y-6">
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-sm">Quarter-Finals</h3>
                    <div id="qf-matches" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-sm">Semi-Finals</h3>
                    <div id="sf-matches" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-sm">Grand Final</h3>
                    <div id="f-match" class="space-y-3"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('padelDB')) || {
            teams: Array(12).fill(""),
            groups: [[], [], []],
            scores: {}, // Key: "g0m1", Value: [4, 6]
            koScores: {},
            generated: false
        };

        const pairings = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600'));
            document.getElementById('tab-' + id).classList.add('border-indigo-600', 'text-indigo-600');
            if(id === 'rankings') updateLeaderboard();
            if(id === 'knockouts') renderKnockouts();
        }

        function init() {
            const container = document.getElementById('team-inputs');
            db.teams.forEach((name, i) => {
                container.innerHTML += `
                    <input type="text" value="${name}" onchange="saveTeam(${i}, this.value)" 
                    placeholder="Team ${i+1} Name" class="w-full p-3 rounded-lg border border-slate-200 shadow-sm">`;
            });
            if(db.generated) renderSchedule();
        }

        function saveTeam(i, val) { db.teams[i] = val; sync(); }
        function sync() { localStorage.setItem('padelDB', JSON.stringify(db)); }

        function generateTournament() {
            db.groups[0] = db.teams.slice(0, 4);
            db.groups[1] = db.teams.slice(4, 8);
            db.groups[2] = db.teams.slice(8, 12);
            db.generated = true;
            sync();
            renderSchedule();
            showTab('groups');
        }

        function renderSchedule() {
            const container = document.getElementById('group-schedule');
            container.innerHTML = "";
            db.groups.forEach((group, gIdx) => {
                let html = `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="bg-slate-800 text-white px-4 py-2 text-xs font-bold uppercase">Group ${String.fromCharCode(65+gIdx)}</div>
                    <div class="p-2 space-y-2">`;
                pairings.forEach((p, mIdx) => {
                    const score = db.scores[`g${gIdx}m${mIdx}`] || ["", ""];
                    html += `
                        <div class="flex items-center justify-between p-2 border-b border-slate-50 last:border-0">
                            <span class="text-sm font-medium w-32 truncate">${group[p[0]] || 'TBD'}</span>
                            <div class="flex gap-1 items-center">
                                <input type="number" value="${score[0]}" onchange="saveScore(${gIdx}, ${mIdx}, 0, this.value)" class="w-10 h-10 text-center bg-slate-100 rounded-md font-bold">
                                <span class="text-slate-300">-</span>
                                <input type="number" value="${score[1]}" onchange="saveScore(${gIdx}, ${mIdx}, 1, this.value)" class="w-10 h-10 text-center bg-slate-100 rounded-md font-bold">
                            </div>
                            <span class="text-sm font-medium w-32 text-right truncate">${group[p[1]] || 'TBD'}</span>
                        </div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        }

        function saveScore(g, m, t, val) {
            const key = `g${g}m${m}`;
            if(!db.scores[key]) db.scores[key] = ["", ""];
            db.scores[key][t] = val === "" ? "" : parseInt(val);
            sync();
        }

        function updateLeaderboard() {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = "";
            let allThirds = [];

            db.groups.forEach((group, gIdx) => {
                let stats = group.map(name => ({ name, p: 0, w: 0, l: 0, gd: 0 }));
                pairings.forEach((p, mIdx) => {
                    const s = db.scores[`g${gIdx}m${mIdx}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        const s0 = parseInt(s[0]), s1 = parseInt(s[1]);
                        stats[p[0]].gd += (s0 - s1);
                        stats[p[1]].gd += (s1 - s0);
                        if(s0 > s1) { stats[p[0]].p += 2; stats[p[0]].w += 1; }
                        else if(s1 > s0) { stats[p[1]].p += 2; stats[p[1]].w += 1; }
                    }
                });

                stats.sort((a, b) => b.p - a.p || b.gd - a.gd);
                allThirds.push({...stats[2], group: String.fromCharCode(65+gIdx)});

                let html = `<div class="bg-white rounded-xl shadow-sm border p-4">
                    <h3 class="font-bold text-indigo-600 mb-3">Group ${String.fromCharCode(65+gIdx)} Table</h3>
                    <table class="w-full text-left text-sm">
                        <tr class="text-slate-400 border-b text-[10px] uppercase">
                            <th class="py-2">Team</th><th class="text-center">W</th><th class="text-center">GD</th><th class="text-right">Pts</th>
                        </tr>`;
                stats.forEach((s, i) => {
                    const rowClass = i < 2 ? 'font-bold text-green-700' : '';
                    html += `<tr class="border-b border-slate-50 ${rowClass}">
                        <td class="py-3 truncate max-w-[120px]">${s.name || '---'}</td>
                        <td class="text-center">${s.w}</td>
                        <td class="text-center">${s.gd > 0 ? '+'+s.gd : s.gd}</td>
                        <td class="text-right font-black">${s.p}</td>
                    </tr>`;
                });
                container.innerHTML += html + `</table></div>`;
            });

            // Handle Wildcards
            allThirds.sort((a, b) => b.p - a.p || b.gd - a.gd);
            const wList = document.getElementById('wildcard-list');
            wList.innerHTML = allThirds.map((s, i) => `
                <div class="flex justify-between text-sm py-1 ${i < 2 ? 'text-green-700 font-bold' : 'text-slate-400'}">
                    <span>${i+1}. ${s.name} (Grp ${s.group})</span>
                    <span>${s.p}pts | GD: ${s.gd}</span>
                </div>
            `).join('');
        }

        function renderKnockouts() {
            const qf = document.getElementById('qf-matches');
            // Simplified Knockout Placeholder with score inputs
            qf.innerHTML = "";
            ["QF 1", "QF 2", "QF 3", "QF 4"].forEach(label => {
                const s = db.koScores[label] || ["", ""];
                qf.innerHTML += `
                <div class="bg-white p-3 rounded-xl border flex items-center justify-between shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400 uppercase w-8">${label}</span>
                    <input type="text" placeholder="TBD" class="text-xs font-bold w-20 truncate outline-none">
                    <div class="flex gap-1">
                        <input type="number" value="${s[0]}" onchange="saveKo('${label}', 0, this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-sm">
                        <input type="number" value="${s[1]}" onchange="saveKo('${label}', 1, this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-sm">
                    </div>
                    <input type="text" placeholder="TBD" class="text-xs font-bold w-20 truncate text-right outline-none">
                </div>`;
            });
        }

        function saveKo(label, t, val) {
            if(!db.koScores[label]) db.koScores[label] = ["", ""];
            db.koScores[label][t] = val;
            sync();
        }

        function resetTournament() {
            if(confirm("Wipe all data and scores?")) {
                localStorage.removeItem('padelDB');
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
