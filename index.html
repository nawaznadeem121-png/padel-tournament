<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Pro: Auto-Bracket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .winner-highlight { background-color: #f0fdf4; border-color: #22c55e; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-20">

    <header class="bg-indigo-900 text-white p-5 shadow-lg sticky top-0 z-20">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold tracking-tight">Padel Central</h1>
            <button onclick="resetTournament()" class="text-xs bg-red-800 px-3 py-1 rounded border border-red-400">Reset</button>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[68px] z-20 shadow-sm">
        <button onclick="showTab('setup')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-setup">Teams</button>
        <button onclick="showTab('groups')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-groups">Scores</button>
        <button onclick="showTab('rankings')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-rankings">Table</button>
        <button onclick="showTab('knockouts')" class="flex-1 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-knockouts">Finals</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">

        <section id="setup" class="tab-content active">
            <h2 class="font-bold text-lg mb-4">Register 12 Teams</h2>
            <div id="team-inputs" class="grid grid-cols-1 gap-2"></div>
            <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Start Tournament</button>
        </section>

        <section id="groups" class="tab-content">
            <div id="group-schedule" class="space-y-8"></div>
        </section>

        <section id="rankings" class="tab-content">
            <div id="leaderboard-container" class="space-y-6"></div>
            <div class="mt-8 bg-amber-50 p-4 rounded-xl border border-amber-200">
                <h3 class="font-bold text-amber-800 mb-2 italic">Wildcard Race (3rd Place Teams)</h3>
                <div id="wildcard-list"></div>
            </div>
        </section>

        <section id="knockouts" class="tab-content">
            <div class="space-y-8">
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-xs tracking-widest">Quarter-Finals</h3>
                    <div id="qf-bracket" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-xs tracking-widest">Semi-Finals</h3>
                    <div id="sf-bracket" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="font-black text-indigo-900 mb-3 uppercase text-xs tracking-widest">The Grand Final</h3>
                    <div id="f-bracket" class="space-y-3"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('padelAutoDB')) || {
            teams: Array(12).fill(""),
            groups: [[], [], []],
            groupScores: {}, 
            koScores: {}, // e.g., QF1: [6,4]
            generated: false
        };

        const pairings = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600'));
            document.getElementById('tab-' + id).classList.add('border-indigo-600', 'text-indigo-600');
            
            if(id === 'rankings' || id === 'knockouts') refreshData();
        }

        function init() {
            const container = document.getElementById('team-inputs');
            db.teams.forEach((name, i) => {
                container.innerHTML += `<input type="text" value="${name}" onchange="db.teams[${i}]=this.value;sync();" placeholder="Team ${i+1}" class="w-full p-3 rounded-lg border border-slate-200">`;
            });
            if(db.generated) { renderGroupMatches(); refreshData(); }
        }

        function sync() { localStorage.setItem('padelAutoDB', JSON.stringify(db)); }

        function generateTournament() {
            db.groups = [db.teams.slice(0,4), db.teams.slice(4,8), db.teams.slice(8,12)];
            db.generated = true; sync(); renderGroupMatches(); showTab('groups');
        }

        function renderGroupMatches() {
            const container = document.getElementById('group-schedule');
            container.innerHTML = "";
            db.groups.forEach((group, gIdx) => {
                let html = `<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                    <div class="bg-slate-800 text-white px-4 py-2 text-xs font-bold uppercase">Group ${String.fromCharCode(65+gIdx)}</div>`;
                pairings.forEach((p, mIdx) => {
                    const s = db.groupScores[`g${gIdx}m${mIdx}`] || ["", ""];
                    html += `<div class="flex items-center justify-between p-3 border-b border-slate-50 last:border-0">
                        <span class="text-xs font-bold w-24 truncate">${group[p[0]] || 'Team 1'}</span>
                        <div class="flex gap-1"><input type="number" value="${s[0]}" onchange="saveGroupScore(${gIdx},${mIdx},0,this.value)" class="w-10 h-10 text-center bg-slate-100 rounded-md font-bold">
                        <input type="number" value="${s[1]}" onchange="saveGroupScore(${gIdx},${mIdx},1,this.value)" class="w-10 h-10 text-center bg-slate-100 rounded-md font-bold"></div>
                        <span class="text-xs font-bold w-24 text-right truncate">${group[p[1]] || 'Team 2'}</span>
                    </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function saveGroupScore(g, m, t, v) {
            const key = `g${g}m${m}`;
            if(!db.groupScores[key]) db.groupScores[key] = ["", ""];
            db.groupScores[key][t] = v === "" ? "" : parseInt(v);
            sync();
        }

        function refreshData() {
            const results = calculateRankings();
            renderTable(results.groupStats, results.wildcards);
            renderBracket(results.qualified);
        }

        function calculateRankings() {
            let groupStats = [];
            let wildcards = [];

            db.groups.forEach((group, gIdx) => {
                let stats = group.map(name => ({ name, p: 0, gd: 0 }));
                pairings.forEach((p, mIdx) => {
                    const s = db.groupScores[`g${gIdx}m${mIdx}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        stats[p[0]].gd += (s[0] - s[1]); stats[p[1]].gd += (s[1] - s[0]);
                        if(s[0] > s[1]) stats[p[0]].p += 2; else if(s[1] > s[0]) stats[p[1]].p += 2;
                    }
                });
                stats.sort((a, b) => b.p - a.p || b.gd - a.gd);
                groupStats.push(stats);
                wildcards.push({...stats[2], group: String.fromCharCode(65+gIdx)});
            });

            wildcards.sort((a, b) => b.p - a.p || b.gd - a.gd);
            
            // Fixed Bracket Mapping
            return {
                groupStats,
                wildcards: wildcards.slice(0, 2),
                qualified: {
                    QF1: { t1: groupStats[0][0].name, t2: wildcards[1].name }, // Winner A vs 2nd Best 3rd
                    QF2: { t1: groupStats[1][0].name, t2: wildcards[0].name }, // Winner B vs Best 3rd
                    QF3: { t1: groupStats[2][0].name, t2: groupStats[0][1].name }, // Winner C vs Runner A
                    QF4: { t1: groupStats[1][1].name, t2: groupStats[2][1].name }  // Runner B vs Runner C
                }
            };
        }

        function renderTable(groups, wc) {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = "";
            groups.forEach((stats, i) => {
                let html = `<div class="bg-white rounded-xl shadow-sm border p-4"><h3 class="font-bold text-indigo-600 mb-2">Group ${String.fromCharCode(65+i)}</h3><table class="w-full text-xs">`;
                stats.forEach((s, idx) => {
                    html += `<tr class="border-b last:border-0 ${idx < 2 ? 'bg-green-50' : ''}"><td class="py-2 font-bold">${s.name}</td><td class="text-right">GD: ${s.gd}</td><td class="text-right font-black w-12">${s.p}pts</td></tr>`;
                });
                container.innerHTML += html + `</table></div>`;
            });
            document.getElementById('wildcard-list').innerHTML = wc.map(w => `<div class="flex justify-between text-sm font-bold text-amber-900"><span>${w.name} (Grp ${w.group})</span><span>${w.p}pts</span></div>`).join('');
        }

        function renderBracket(q) {
            const winners = {};
            
            // Helper to render a match and capture winner
            const renderMatch = (id, t1, t2, targetContainer) => {
                const s = db.koScores[id] || ["", ""];
                const w = s[0] !== "" && s[1] !== "" ? (s[0] > s[1] ? t1 : t2) : "";
                winners[id] = w;
                
                targetContainer.innerHTML += `
                <div class="bg-white p-3 rounded-xl border flex items-center justify-between shadow-sm">
                    <div class="w-24 truncate text-[11px] font-bold ${w === t1 && w !== '' ? 'text-green-600':''}">${t1 || 'TBD'}</div>
                    <div class="flex gap-1">
                        <input type="number" value="${s[0]}" onchange="saveKoScore('${id}',0,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-sm">
                        <input type="number" value="${s[1]}" onchange="saveKoScore('${id}',1,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-sm">
                    </div>
                    <div class="w-24 truncate text-[11px] font-bold text-right ${w === t2 && w !== '' ? 'text-green-600':''}">${t2 || 'TBD'}</div>
                </div>`;
            };

            const qfC = document.getElementById('qf-bracket'); qfC.innerHTML = "";
            renderMatch("QF1", q.QF1.t1, q.QF1.t2, qfC);
            renderMatch("QF2", q.QF2.t1, q.QF2.t2, qfC);
            renderMatch("QF3", q.QF3.t1, q.QF3.t2, qfC);
            renderMatch("QF4", q.QF4.t1, q.QF4.t2, qfC);

            const sfC = document.getElementById('sf-bracket'); sfC.innerHTML = "";
            renderMatch("SF1", winners.QF1, winners.QF4, sfC);
            renderMatch("SF2", winners.QF2, winners.QF3, sfC);

            const fC = document.getElementById('f-bracket'); fC.innerHTML = "";
            renderMatch("FINAL", winners.SF1, winners.SF2, fC);
        }

        function saveKoScore(id, t, v) {
            if(!db.koScores[id]) db.koScores[id] = ["", ""];
            db.koScores[id][t] = v === "" ? "" : parseInt(v);
            sync(); refreshData();
        }

        function resetTournament() { if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); } }

        init();
    </script>
</body>
</html>
