<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Padel Hub | Professional Club Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page-content { display: none; }
        .page-content.active { display: block; }
        .tournament-tab { display: none; }
        .tournament-tab.active { display: block; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Mobile Zoom Fix */
        input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-indigo-950 text-white sticky top-0 z-[100] shadow-xl">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2 cursor-pointer" onclick="showPage('home')">
                    <span class="text-2xl">🎾</span>
                    <span class="font-black text-xl tracking-tighter uppercase">Padel<span class="text-amber-400">Hub</span></span>
                </div>
                
                <div class="hidden md:flex space-x-8 text-sm font-bold uppercase tracking-widest">
                    <button onclick="showPage('home')" class="hover:text-amber-400 transition">Home</button>
                    <button onclick="showPage('about')" class="hover:text-amber-400 transition">About</button>
                    <button onclick="showPage('tournaments')" class="text-amber-400 hover:text-white transition">Tournaments</button>
                    <button onclick="showPage('rules')" class="hover:text-amber-400 transition">Rules</button>
                    <button onclick="showPage('faqs')" class="hover:text-amber-400 transition">FAQs</button>
                </div>

                <div class="md:hidden">
                    <button onclick="toggleMobileMenu()" class="text-2xl p-2"><i class="fas fa-bars"></i></button>
                </div>
            </div>
        </div>
        
        <div id="mobile-menu" class="hidden bg-indigo-900 border-t border-indigo-800 md:hidden">
            <div class="flex flex-col p-4 space-y-4 font-bold uppercase text-sm">
                <button onclick="showPage('home')" class="text-left">Home</button>
                <button onclick="showPage('about')" class="text-left">About Us</button>
                <button onclick="showPage('tournaments')" class="text-left text-amber-400">Tournaments</button>
                <button onclick="showPage('rules')" class="text-left">Rules</button>
                <button onclick="showPage('faqs')" class="text-left">FAQs</button>
            </div>
        </div>
    </nav>

    <main id="page-home" class="page-content active fade-in">
        <section class="relative h-[60vh] flex items-center justify-center bg-indigo-900 overflow-hidden">
            <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1626244101212-39d78a147ad4?q=80&w=2070')] bg-cover bg-center"></div>
            <div class="relative z-10 text-center px-6">
                <h1 class="text-4xl md:text-6xl font-black text-white mb-4 leading-tight uppercase">Elevate Your <br><span class="text-amber-400">Padel Game</span></h1>
                <p class="text-indigo-100 mb-8 max-w-md mx-auto">The ultimate platform for club rankings and professional tournament management.</p>
                <button onclick="showPage('tournaments')" class="bg-amber-500 hover:bg-amber-400 text-indigo-950 font-black px-8 py-4 rounded-full transition transform hover:scale-105 shadow-lg uppercase tracking-widest text-sm">Organize Now</button>
            </div>
        </section>
    </main>

    <main id="page-about" class="page-content fade-in py-16 px-6 max-w-3xl mx-auto">
        <h2 class="text-3xl font-black text-indigo-950 mb-6 uppercase italic">About Padel Hub</h2>
        <div class="prose text-slate-600 space-y-4">
            <p>Padel Hub was designed for enthusiasts who want professional-grade tournament organization without the overhead of complex software.</p>
        </div>
    </main>

    <main id="page-tournaments" class="page-content fade-in">
        <div id="tournament-dashboard">
            <nav class="flex bg-white border-b sticky top-[64px] z-30 overflow-x-auto no-scrollbar">
                <button onclick="showTTab('setup')" id="tt-setup" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">Setup</button>
                <button onclick="showTTab('groups')" id="tt-groups" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">Scores</button>
                <button onclick="showTTab('rankings')" id="tt-rankings" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">Standings</button>
                <button onclick="showTTab('finals')" id="tt-finals" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">Finals</button>
                <button onclick="showTTab('history')" id="tt-history" class="flex-none px-6 py-4 text-[10px] font-black uppercase border-b-2 border-transparent">History</button>
            </nav>

            <div class="p-4 max-w-md mx-auto">
                <div id="t-setup" class="tournament-tab active">
                    <div id="team-inputs" class="grid gap-2"></div>
                    <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-black py-4 rounded-xl shadow-lg uppercase text-sm tracking-widest">Lock & Start</button>
                </div>
                <div id="t-groups" class="tournament-tab"><div id="group-schedule" class="space-y-6"></div></div>
                <div id="t-rankings" class="tournament-tab">
                    <div id="leaderboard-container" class="space-y-6"></div>
                    <div id="wildcard-list" class="mt-6 bg-amber-50 p-4 rounded-xl border border-amber-200"></div>
                </div>
                <div id="t-finals" class="tournament-tab">
                    <div id="qf-bracket" class="space-y-3 mb-8"></div>
                    <div id="sf-bracket" class="space-y-3 mb-8"></div>
                    <div id="f-bracket" class="space-y-3"></div>
                    <div id="archive-button-container" class="mt-10 hidden">
                        <button onclick="archiveTournament()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-xl">COMPLETE & ARCHIVE</button>
                    </div>
                </div>
                <div id="t-history" class="tournament-tab">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-xs uppercase tracking-widest">Archives</h3>
                        <div class="flex gap-2">
                            <button onclick="exportDB()" class="text-[9px] bg-slate-200 px-2 py-1 rounded font-bold">EXPORT</button>
                            <button onclick="document.getElementById('importFile').click()" class="text-[9px] bg-slate-200 px-2 py-1 rounded font-bold">IMPORT</button>
                            <input type="file" id="importFile" class="hidden" onchange="importDB(event)">
                        </div>
                    </div>
                    <div id="history-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // GLOBAL STATE
        const USER_KEY = "ClubManager";
        let activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };

        const getDB = () => JSON.parse(localStorage.getItem('padelDB')) || { [USER_KEY]: { history: [], active: activeData } };
        const saveDB = (db) => localStorage.setItem('padelDB', JSON.stringify(db));

        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            window.scrollTo(0, 0);
            if(pageId === 'tournaments') refreshUI();
            document.getElementById('mobile-menu').classList.add('hidden');
        }

        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        function showTTab(tabId) {
            document.querySelectorAll('.tournament-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + tabId).classList.add('active');
            document.querySelectorAll('#tournament-dashboard nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600'));
            const btn = document.getElementById('tt-' + tabId);
            if(btn) btn.classList.add('border-indigo-600', 'text-indigo-600');
            if(tabId !== 'setup') refreshUI();
        }

        function sync() {
            const db = getDB();
            db[USER_KEY].active = activeData;
            saveDB(db);
        }

        function initInputs() {
            const cont = document.getElementById('team-inputs'); cont.innerHTML = "";
            activeData.teams.forEach((t, i) => {
                cont.innerHTML += `<input type="text" value="${t}" onchange="activeData.teams[${i}]=this.value;sync()" placeholder="Team ${i+1}" class="w-full p-4 rounded-xl border border-slate-200 outline-none text-sm font-bold shadow-sm">`;
            });
        }

        function generateTournament() {
            activeData.groups = [activeData.teams.slice(0,4), activeData.teams.slice(4,8), activeData.teams.slice(8,12)];
            activeData.generated = true; activeData.groupScores = {}; activeData.koScores = {};
            sync(); renderMatches(); showTTab('groups');
        }

        function renderMatches() {
            const cont = document.getElementById('group-schedule'); if(!cont) return;
            cont.innerHTML = "";
            const pairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            activeData.groups.forEach((g, gIdx) => {
                let h = `<div class="bg-white rounded-2xl shadow-sm border overflow-hidden"><div class="bg-indigo-900 text-white px-4 py-2 text-[10px] font-black uppercase">Group ${String.fromCharCode(65+gIdx)}</div>`;
                pairs.forEach((p, mIdx) => {
                    const s = activeData.groupScores[`g${gIdx}m${mIdx}`] || ["", ""];
                    h += `<div class="flex items-center justify-between p-3 border-b last:border-0"><span class="text-[10px] font-bold w-20 truncate">${g[p[0]]||'TBD'}</span><div class="flex gap-1"><input type="number" value="${s[0]}" onchange="updateGS(${gIdx},${mIdx},0,this.value)" class="w-10 h-10 text-center bg-slate-50 rounded-lg font-bold"><input type="number" value="${s[1]}" onchange="updateGS(${gIdx},${mIdx},1,this.value)" class="w-10 h-10 text-center bg-slate-50 rounded-lg font-bold"></div><span class="text-[10px] font-bold w-20 text-right truncate">${g[p[1]]||'TBD'}</span></div>`;
                });
                cont.innerHTML += h + `</div>`;
            });
        }

        function updateGS(g, m, t, v) {
            const k = `g${g}m${m}`; if(!activeData.groupScores[k]) activeData.groupScores[k] = ["",""];
            activeData.groupScores[k][t] = v === "" ? "" : parseInt(v); sync();
        }

        function refreshUI() {
            const res = calculate();
            renderTables(res);
            renderBracket(res.qual);
            renderHistory();
        }

        function calculate() {
            let gStats = []; let thirds = [];
            activeData.groups.forEach((g, i) => {
                let stats = g.map(name => ({ name, p: 0, gd: 0 }));
                [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach((p, m) => {
                    const s = activeData.groupScores[`g${i}m${m}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        stats[p[0]].gd += (s[0]-s[1]); stats[p[1]].gd += (s[1]-s[0]);
                        if(s[0]>s[1]) stats[p[0]].p += 2; else if(s[1]>s[0]) stats[p[1]].p += 2;
                    }
                });
                stats.sort((a,b) => b.p - a.p || b.gd - a.gd);
                gStats.push(stats); thirds.push({...stats[2], g: String.fromCharCode(65+i)});
            });
            thirds.sort((a,b) => b.p - a.p || b.gd - a.gd);
            const wc = thirds.slice(0,2);
            return { gStats, wc, qual: { 
                QF1: [gStats[0][0].name, wc[1].name], QF2: [gStats[1][0].name, wc[0].name], 
                QF3: [gStats[2][0].name, gStats[0][1].name], QF4: [gStats[1][1].name, gStats[2][1].name] 
            }};
        }

        function renderTables(res) {
            const cont = document.getElementById('leaderboard-container'); if(!cont) return;
            cont.innerHTML = "";
            res.gStats.forEach((s, i) => {
                let h = `<div class="bg-white p-4 rounded-xl shadow-sm border"><h3 class="font-black text-[10px] text-indigo-600 mb-2 uppercase">Group ${String.fromCharCode(65+i)}</h3><table class="w-full text-xs">`;
                s.forEach((t, idx) => h += `<tr class="${idx<2?'font-bold text-green-600':''}"><td class="py-1">${t.name||'---'}</td><td class="text-right">${t.p}pts (${t.gd>0?'+':''}${t.gd})</td></tr>`);
                cont.innerHTML += h + `</table></div>`;
            });
            const wcCont = document.getElementById('wildcard-list');
            wcCont.innerHTML = `<h3 class="font-black text-[10px] text-amber-600 mb-2 uppercase tracking-widest">Qualified Runners Up</h3>`;
            res.wc.forEach((w, i) => {
                wcCont.innerHTML += `<div class="flex justify-between text-xs font-bold py-1"><span>${i+1}. ${w.name||'---'}</span><span>${w.p}pts</span></div>`;
            });
        }

        function renderBracket(qual) {
            const wins = {};
            const renderM = (id, t1, t2, contId) => {
                const s = activeData.koScores[id] || ["",""];
                const w = (t1 && t2 && s[0] !== "" && s[1] !== "") ? (s[0]>s[1]?t1:t2) : null;
                wins[id] = w;
                const el = document.getElementById(contId);
                if(el) el.innerHTML += `<div class="bg-white p-3 rounded-xl border flex items-center justify-between shadow-sm"><span class="text-[10px] font-bold w-20 truncate ${w==t1?'text-green-600':''}">${t1||'TBD'}</span><div class="flex gap-1"><input type="number" value="${s[0]}" onchange="updateKS('${id}',0,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-xs"><input type="number" value="${s[1]}" onchange="updateKS('${id}',1,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-xs"></div><span class="text-[10px] font-bold w-20 text-right truncate ${w==t2?'text-green-600':''}">${t2||'TBD'}</span></div>`;
            };
            
            document.getElementById('qf-bracket').innerHTML = `<p class="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-tighter">Quarter-Finals</p>`;
            renderM("QF1", qual.QF1[0], qual.QF1[1], 'qf-bracket'); renderM("QF2", qual.QF2[0], qual.QF2[1], 'qf-bracket');
            renderM("QF3", qual.QF3[0], qual.QF3[1], 'qf-bracket'); renderM("QF4", qual.QF4[0], qual.QF4[1], 'qf-bracket');
            
            document.getElementById('sf-bracket').innerHTML = `<p class="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-tighter">Semi-Finals</p>`;
            renderM("SF1", wins.QF1, wins.QF4, 'sf-bracket'); renderM("SF2", wins.QF2, wins.QF3, 'sf-bracket');
            
            document.getElementById('f-bracket').innerHTML = `<p class="text-[9px] font-black text-slate-400 mb-2 uppercase tracking-tighter">Grand Final</p>`;
            renderM("F", wins.SF1, wins.SF2, 'f-bracket');
            
            const arcBtn = document.getElementById('archive-button-container');
            if(wins.F) { activeData.finalWinner = wins.F; arcBtn.classList.remove('hidden'); }
            else { arcBtn.classList.add('hidden'); }
        }

        function updateKS(id, t, v) {
            if(!activeData.koScores[id]) activeData.koScores[id] = ["",""];
            activeData.koScores[id][t] = v === "" ? "" : parseInt(v); sync(); refreshUI();
        }

        function archiveTournament() {
            if(!confirm("Complete and archive?")) return;
            const db = getDB();
            const entry = { id: Date.now(), date: new Date().toLocaleString(), winner: activeData.finalWinner, data: JSON.parse(JSON.stringify(activeData)) };
            db[USER_KEY].history.unshift(entry);
            activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };
            db[USER_KEY].active = activeData;
            saveDB(db); initInputs(); renderMatches(); refreshUI(); showTTab('history');
        }

        function renderHistory() {
            const db = getDB(); const list = document.getElementById('history-list'); if(!list) return;
            list.innerHTML = "";
            if(!db[USER_KEY].history.length) return list.innerHTML = "<p class='text-center text-xs text-slate-400'>No history.</p>";
            db[USER_KEY].history.forEach(h => {
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-xl border flex justify-between items-center";
                item.innerHTML = `<div onclick="viewHistory(${h.id})" class="flex-1 cursor-pointer"><p class="text-[9px] font-black text-slate-400 uppercase">${h.date}</p><p class="font-bold text-slate-800">Winner: ${h.winner}</p></div><button onclick="deleteHistory(${h.id})" class="text-xs text-red-400 font-bold p-2">Delete</button>`;
                list.appendChild(item);
            });
        }

        function viewHistory(id) {
            const db = getDB(); const entry = db[USER_KEY].history.find(x => x.id === id);
            activeData = JSON.parse(JSON.stringify(entry.data));
            refreshUI(); showTTab('finals');
        }

        function deleteHistory(id) {
            if(!confirm("Delete?")) return;
            const db = getDB(); db[USER_KEY].history = db[USER_KEY].history.filter(x => x.id !== id);
            saveDB(db); renderHistory();
        }

        function exportDB() {
            const data = localStorage.getItem('padelDB');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `padel_hub_backup.json`;
            a.click();
        }

        function importDB(e) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                localStorage.setItem('padelDB', ev.target.result);
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = () => {
            const db = getDB();
            activeData = db[USER_KEY].active;
            initInputs();
            if(activeData.generated) renderMatches();
            showTTab('setup');
        };
    </script>
</body>
</html>
