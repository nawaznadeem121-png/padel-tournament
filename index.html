<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Pro: Global Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        @keyframes flash {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        .animate-champion { animation: flash 0.8s ease-in-out infinite; }

        .particle {
            position: fixed; top: -20px; width: 8px; height: 8px; border-radius: 2px;
            animation: fall linear infinite; pointer-events: none; z-index: 100;
        }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); } 100% { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-20 overflow-x-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-indigo-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="text-4xl mb-2">🎾</div>
                <h1 class="text-2xl font-bold text-slate-800">Padel Pro Manager</h1>
                <p class="text-slate-500 text-sm">Sign in to save your tournaments</p>
            </div>
            
            <div id="auth-form" class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-4 bg-slate-100 rounded-xl outline-none border-2 border-transparent focus:border-indigo-500">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-xl outline-none border-2 border-transparent focus:border-indigo-500">
                
                <div class="flex gap-2 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">Login</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">Register</button>
                </div>
            </div>
            <p id="auth-msg" class="text-center text-red-500 mt-4 text-sm font-medium"></p>
        </div>
    </div>

    <header class="bg-indigo-950 text-white p-5 shadow-lg sticky top-0 z-30">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold tracking-tight">Padel <span class="text-amber-400">Pro</span></h1>
            <div class="flex items-center gap-3">
                <span id="user-display" class="text-[10px] uppercase font-bold text-indigo-300 bg-indigo-900 px-2 py-1 rounded"></span>
                <button onclick="logout()" class="text-xs bg-slate-800 px-2 py-1 rounded">Logout</button>
            </div>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[68px] z-30 shadow-sm overflow-x-auto">
        <button onclick="showTab('setup')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-setup">Teams</button>
        <button onclick="showTab('groups')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-groups">Scores</button>
        <button onclick="showTab('rankings')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-rankings">Table</button>
        <button onclick="showTab('knockouts')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-knockouts">Finals</button>
        <button onclick="showTab('history')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-history">History</button>
        <button onclick="showTab('winner')" class="flex-none px-6 py-3 text-lg font-bold border-b-2 border-transparent hidden text-amber-500" id="tab-winner">🏆</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">

        <section id="setup" class="tab-content active">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg">Active Tournament</h2>
                <button onclick="resetTournament()" class="text-[10px] text-red-500 font-bold uppercase border border-red-200 px-2 py-1 rounded">Reset Current</button>
            </div>
            <div id="team-inputs" class="grid grid-cols-1 gap-2"></div>
            <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Start New Tournament</button>
        </section>

        <section id="groups" class="tab-content">
            <div id="group-schedule" class="space-y-6"></div>
        </section>

        <section id="rankings" class="tab-content">
            <div id="leaderboard-container" class="space-y-6"></div>
            <div id="wildcard-list" class="mt-4 bg-amber-50 p-4 rounded-xl border border-amber-100"></div>
        </section>

        <section id="knockouts" class="tab-content">
            <div id="bracket-container" class="space-y-8">
                <div><h3 class="font-black text-indigo-900 mb-3 text-xs tracking-widest uppercase">Quarter-Finals</h3><div id="qf-bracket" class="space-y-3"></div></div>
                <div><h3 class="font-black text-indigo-900 mb-3 text-xs tracking-widest uppercase">Semi-Finals</h3><div id="sf-bracket" class="space-y-3"></div></div>
                <div><h3 class="font-black text-indigo-900 mb-3 text-xs tracking-widest uppercase">The Grand Final</h3><div id="f-bracket" class="space-y-3"></div></div>
            </div>
            <div id="archive-button-container" class="mt-10 hidden">
                <button onclick="archiveTournament()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-xl animate-bounce">SAVE TO HISTORY & ARCHIVE</button>
            </div>
        </section>

        <section id="history" class="tab-content">
            <h2 class="font-bold text-lg mb-4">Past Tournaments</h2>
            <div id="history-list" class="space-y-3">
                </div>
        </section>

        <section id="winner" class="tab-content text-center pt-20">
            <div class="text-6xl mb-4">🏆</div>
            <div id="champion-name-display" class="text-4xl font-black text-amber-500 animate-champion uppercase tracking-tighter"></div>
            <p class="text-slate-400 mt-4 font-bold text-sm">CHAMPION DE PADEL</p>
            <button onclick="showTab('knockouts')" class="mt-10 text-indigo-600 font-bold underline">Return to Details</button>
        </section>
    </main>

    <div id="particle-container"></div>

    <script>
        // Global State
        let currentUser = null;
        let activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };
        let accounts = JSON.parse(localStorage.getItem('padelAccounts')) || {};

        // --- AUTH LOGIC ---
        function handleAuth(type) {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const msg = document.getElementById('auth-msg');

            if(!u || !p) { msg.innerText = "Please fill all fields"; return; }

            if(type === 'register') {
                if(accounts[u]) { msg.innerText = "Username exists"; return; }
                accounts[u] = { password: p, history: [], active: activeData };
                saveAccounts();
                loginUser(u);
            } else {
                if(accounts[u] && accounts[u].password === p) { loginUser(u); }
                else { msg.innerText = "Invalid credentials"; }
            }
        }

        function loginUser(u) {
            currentUser = u;
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = u;
            activeData = accounts[u].active || activeData;
            initSetupInputs();
            if(activeData.generated) { renderGroupMatches(); refreshUI(); }
            showTab('setup');
        }

        function logout() { location.reload(); }
        function saveAccounts() { localStorage.setItem('padelAccounts', JSON.stringify(accounts)); }
        function syncActive() { if(currentUser) { accounts[currentUser].active = activeData; saveAccounts(); } }

        // --- TOURNAMENT LOGIC ---
        function initSetupInputs() {
            const container = document.getElementById('team-inputs');
            container.innerHTML = "";
            activeData.teams.forEach((name, i) => {
                const input = document.createElement('input');
                input.type = "text";
                input.value = name;
                input.placeholder = `Team ${i+1}`;
                input.className = "w-full p-3 rounded-xl border border-slate-200 shadow-sm outline-none focus:border-indigo-500";
                input.onchange = (e) => { activeData.teams[i] = e.target.value; syncActive(); };
                container.appendChild(input);
            });
        }

        function generateTournament() {
            if(!currentUser) return;
            activeData.groups = [activeData.teams.slice(0,4), activeData.teams.slice(4,8), activeData.teams.slice(8,12)];
            activeData.generated = true;
            activeData.finalWinner = null;
            activeData.koScores = {};
            activeData.groupScores = {};
            syncActive();
            renderGroupMatches();
            showTab('groups');
        }

        function renderGroupMatches() {
            const container = document.getElementById('group-schedule');
            container.innerHTML = "";
            const pairings = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            activeData.groups.forEach((group, gIdx) => {
                let html = `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-4">
                    <div class="bg-indigo-900 text-white px-4 py-2 text-xs font-black uppercase">Group ${String.fromCharCode(65+gIdx)}</div>`;
                pairings.forEach((p, mIdx) => {
                    const s = activeData.groupScores[`g${gIdx}m${mIdx}`] || ["", ""];
                    html += `<div class="flex items-center justify-between p-3 border-b border-slate-50 last:border-0">
                        <span class="text-[11px] font-bold w-24 truncate">${group[p[0]] || 'TBD'}</span>
                        <div class="flex gap-1">
                            <input type="number" value="${s[0]}" onchange="saveScore(${gIdx},${mIdx},0,this.value)" class="w-10 h-10 text-center bg-slate-50 rounded-lg font-bold">
                            <input type="number" value="${s[1]}" onchange="saveScore(${gIdx},${mIdx},1,this.value)" class="w-10 h-10 text-center bg-slate-50 rounded-lg font-bold">
                        </div>
                        <span class="text-[11px] font-bold w-24 text-right truncate">${group[p[1]] || 'TBD'}</span>
                    </div>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function saveScore(g, m, t, v) {
            const key = `g${g}m${m}`;
            if(!activeData.groupScores[key]) activeData.groupScores[key] = ["", ""];
            activeData.groupScores[key][t] = v === "" ? "" : parseInt(v);
            syncActive();
        }

        function refreshUI() {
            const results = calculateLogic();
            renderTables(results);
            renderBracket(results.qualified);
            renderHistory();
        }

        function calculateLogic() {
            let groupStats = [];
            let allThirds = [];
            const pairings = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];

            activeData.groups.forEach((group, gIdx) => {
                let stats = group.map(name => ({ name, p: 0, gd: 0 }));
                pairings.forEach((p, mIdx) => {
                    const s = activeData.groupScores[`g${gIdx}m${mIdx}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        stats[p[0]].gd += (s[0] - s[1]); stats[p[1]].gd += (s[1] - s[0]);
                        if(s[0] > s[1]) stats[p[0]].p += 2; else if(s[1] > s[0]) stats[p[1]].p += 2;
                    }
                });
                stats.sort((a, b) => b.p - a.p || b.gd - a.gd);
                groupStats.push(stats);
                allThirds.push({...stats[2], group: String.fromCharCode(65+gIdx)});
            });

            allThirds.sort((a,b) => b.p - a.p || b.gd - a.gd);
            const wc = allThirds.slice(0, 2);

            return {
                groupStats, wildcards: wc,
                qualified: {
                    QF1: { t1: groupStats[0][0].name, t2: wc[1].name },
                    QF2: { t1: groupStats[1][0].name, t2: wc[0].name },
                    QF3: { t1: groupStats[2][0].name, t2: groupStats[0][1].name },
                    QF4: { t1: groupStats[1][1].name, t2: groupStats[2][1].name }
                }
            };
        }

        function renderTables(res) {
            const cont = document.getElementById('leaderboard-container');
            cont.innerHTML = "";
            res.groupStats.forEach((stats, i) => {
                let html = `<div class="bg-white rounded-xl shadow-sm border p-4"><h3 class="font-black text-indigo-600 text-xs mb-2 uppercase">Group ${String.fromCharCode(65+i)}</h3><table class="w-full text-xs">`;
                stats.forEach((s, idx) => {
                    html += `<tr class="border-b last:border-0 ${idx < 2 ? 'font-bold text-green-600':''}"><td class="py-2">${s.name}</td><td class="text-right font-black">${s.p}pts</td></tr>`;
                });
                cont.innerHTML += html + `</table></div>`;
            });
            document.getElementById('wildcard-list').innerHTML = `<p class="text-[10px] font-black uppercase text-amber-600 mb-1">Top 3rd Place Teams</p>` + res.wildcards.map(w => `<div class="flex justify-between text-xs font-bold text-amber-900"><span>${w.name}</span><span>${w.p}pts</span></div>`).join('');
        }

        function renderBracket(q) {
            const winners = {};
            const matchups = {
                QF: [ ["QF1", q.QF1.t1, q.QF1.t2], ["QF2", q.QF2.t1, q.QF2.t2], ["QF3", q.QF3.t1, q.QF3.t2], ["QF4", q.QF4.t1, q.QF4.t2] ],
                SF: [ ["SF1", "winners.QF1", "winners.QF4"], ["SF2", "winners.QF2", "winners.QF3"] ],
                F:  [ ["FINAL", "winners.SF1", "winners.SF2"] ]
            };

            const renderM = (id, team1, team2, container) => {
                const t1 = team1.startsWith("winners") ? eval(team1) : team1;
                const t2 = team2.startsWith("winners") ? eval(team2) : team2;
                const s = activeData.koScores[id] || ["", ""];
                const w = (t1 && t2 && s[0] !== "" && s[1] !== "") ? (s[0] > s[1] ? t1 : t2) : "";
                winners[id] = w;

                container.innerHTML += `
                <div class="bg-white p-3 rounded-xl border flex items-center justify-between shadow-sm border-slate-100">
                    <div class="w-24 truncate text-[11px] font-bold ${w === t1 && w ? 'text-green-600':''}">${t1 || '---'}</div>
                    <div class="flex gap-1">
                        <input type="number" value="${s[0]}" onchange="saveKo('${id}',0,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-sm">
                        <input type="number" value="${s[1]}" onchange="saveKo('${id}',1,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-sm">
                    </div>
                    <div class="w-24 truncate text-[11px] font-bold text-right ${w === t2 && w ? 'text-green-600':''}">${t2 || '---'}</div>
                </div>`;
            };

            const qfC = document.getElementById('qf-bracket'); qfC.innerHTML = "";
            matchups.QF.forEach(m => renderM(m[0], m[1], m[2], qfC));
            const sfC = document.getElementById('sf-bracket'); sfC.innerHTML = "";
            matchups.SF.forEach(m => renderM(m[0], m[1], m[2], sfC));
            const fC = document.getElementById('f-bracket'); fC.innerHTML = "";
            renderM("FINAL", "winners.SF1", "winners.SF2", fC);

            if(winners.FINAL) {
                activeData.finalWinner = winners.FINAL;
                document.getElementById('archive-button-container').classList.remove('hidden');
                document.getElementById('champion-name-display').innerText = winners.FINAL;
                document.getElementById('tab-winner').classList.remove('hidden');
            } else {
                document.getElementById('archive-button-container').classList.add('hidden');
                document.getElementById('tab-winner').classList.add('hidden');
            }
        }

        function saveKo(id, t, v) {
            if(!activeData.koScores[id]) activeData.koScores[id] = ["", ""];
            activeData.koScores[id][t] = v === "" ? "" : parseInt(v);
            syncActive(); refreshUI();
        }

        // --- HISTORY & ARCHIVING ---
        function archiveTournament() {
            if(!confirm("Archive this tournament and clear the current board?")) return;
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                winner: activeData.finalWinner,
                data: JSON.parse(JSON.stringify(activeData))
            };
            accounts[currentUser].history.unshift(entry);
            // Reset Active
            activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };
            syncActive();
            location.reload();
        }

        function renderHistory() {
            const cont = document.getElementById('history-list');
            cont.innerHTML = "";
            if(!currentUser || accounts[currentUser].history.length === 0) {
                cont.innerHTML = "<p class='text-slate-400 text-center py-10 text-sm'>No completed tournaments yet.</p>";
                return;
            }
            accounts[currentUser].history.forEach(h => {
                cont.innerHTML += `
                <div onclick="viewHistoryDetails(${h.id})" class="bg-white p-4 rounded-xl border shadow-sm flex justify-between items-center active:bg-slate-50">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">${h.date}</p>
                        <p class="font-bold text-slate-800">Winner: ${h.winner}</p>
                    </div>
                    <div class="text-indigo-600 text-xs font-bold">View Details →</div>
                </div>`;
            });
        }

        function viewHistoryDetails(id) {
            const h = accounts[currentUser].history.find(x => x.id === id);
            activeData = h.data; // Temporarily load data
            refreshUI();
            showTab('knockouts');
            alert("Viewing ARCHIVED details for tournament on " + h.date);
        }

        // --- TABS & ANIMATION ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600', 'border-amber-500'));
            const btn = document.getElementById('tab-'+id);
            if(id === 'winner') { btn.classList.add('border-amber-500'); startConfetti(); }
            else { btn.classList.add('border-indigo-600', 'text-indigo-600'); stopConfetti(); }
            if(id === 'rankings' || id === 'knockouts' || id === 'history') refreshUI();
        }

        function startConfetti() {
            const cont = document.getElementById('particle-container');
            for(let i=0; i<50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.backgroundColor = ['#fbbf24','#34d399','#60a5fa','#f87171'][Math.floor(Math.random()*4)];
                p.style.animationDuration = (Math.random()*3+2)+'s';
                p.style.animationDelay = (Math.random()*2)+'s';
                cont.appendChild(p);
            }
        }
        function stopConfetti() { document.getElementById('particle-container').innerHTML = ""; }
        function resetTournament() { if(confirm("Clear current board?")) { activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false }; syncActive(); location.reload(); } }

        window.onload = () => { if(!currentUser) document.getElementById('auth-overlay').classList.remove('hidden'); };
    </script>
</body>
</html>
