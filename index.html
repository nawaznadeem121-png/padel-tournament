<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>The Court Club | Live Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* REBRANDED COLOR PALETTE MATCHING ATTACHMENT */
        :root {
            --cc-dark-navy: #111a33;
            --cc-gold-accent: #f1e7d0;
            --cc-timer-text: #e8dfc9;
            --cc-bg-light: #f4f4f6;
            --cc-tab-active-bg: #1e2b4f;
            --cc-btn-green: #22a65a;
        }

        .tournament-tab { display: none; }
        .tournament-tab.active { display: block; }
        input, select { font-size: 16px !important; touch-action: manipulation; }
        
        /* Navigation Style */
        #main-nav { background-color: var(--cc-dark-navy); }
        #main-nav button { color: #8e99af; transition: color 0.2s; }
        #main-nav button.active-tab-btn { color: white; border-bottom: none; }

        /* Custom Styles to match image precisely */
        .cc-header { background-color: var(--cc-dark-navy); }
        .timer-box { border: 1px solid #334063; }
        .bg-cc-dark { background-color: var(--cc-dark-navy); }
        .bg-cc-active-tab { background-color: var(--cc-tab-active-bg); }
        .border-cc-gold { border-color: var(--cc-gold-accent); }
        .text-cc-timer { color: var(--cc-timer-text); }
        .text-cc-gold { color: var(--cc-gold-accent); }
        
        /* Table and Row styles */
        .qualifying-row { background-color: #f0fdf4; font-weight: 800; color: #166534; }
        .wildcard-row { background-color: #fffbeb; font-weight: 800; color: #92400e; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-[#f4f4f6] text-slate-900 font-sans">

    <header class="cc-header text-white px-4 pt-6 pb-4 shadow-md">
        <div class="flex flex-col items-center gap-6">
            <img src="logo.png" alt="The Court Club" class="h-16 w-auto object-contain">
            
            <div class="timer-box w-full max-w-sm rounded-lg py-3 px-4 text-center">
                <p class="text-[9px] font-medium uppercase tracking-[0.2em] text-cc-gold opacity-80 mb-1">REMAINING TOURNAMENT TIME</p>
                <p id="global-countdown" class="text-3xl font-light text-cc-timer tracking-tight">03:00:00</p>
            </div>
            
            <div id="live-indicator" class="hidden flex items-center gap-2 bg-red-600 px-3 py-1.5 rounded-full text-[10px] font-black uppercase">
                <span class="w-2 h-2 bg-white rounded-full pulse"></span> <span id="live-text">Live</span>
            </div>
        </div>
    </header>

    <nav id="main-nav" class="flex border-b border-[#253256] sticky top-0 z-30 shadow-sm px-2">
        <button onclick="showTab('setup')" id="btn-setup" class="flex-1 py-4 text-[10px] font-black uppercase tracking-wider admin-only">Setup</button>
        <button onclick="showTab('groups')" id="btn-groups" class="flex-1 py-4 text-[10px] font-black uppercase tracking-wider">Scores</button>
        <button onclick="showTab('rankings')" id="btn-rankings" class="flex-1 py-4 text-[10px] font-black uppercase tracking-wider">Standings</button>
        <button onclick="showTab('finals')" id="btn-finals" class="flex-1 py-4 text-[10px] font-black uppercase tracking-wider">Finals</button>
    </nav>

    <div class="p-4 max-w-md mx-auto pb-20">
        <div id="sync-overlay" class="hidden text-center py-20">
            <i class="fa-solid fa-cloud-arrow-down text-orange-400 text-4xl mb-4 animate-bounce"></i>
            <p class="font-black text-slate-600 uppercase text-xs tracking-wider">Syncing Tournament...</p>
            <p id="sync-status" class="text-[10px] text-slate-400 mt-2 uppercase italic">Connecting...</p>
        </div>

        <div id="tab-setup" class="tournament-tab active admin-only">
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setTeams(12)" id="sz-12" class="py-4 rounded-lg border-2 font-bold text-slate-200 border-[#253256] bg-cc-active-tab">12 Teams</button>
                <button onclick="setTeams(16)" id="sz-16" class="py-4 rounded-lg border font-bold text-slate-700 border-slate-300 bg-white">16 Teams</button>
                <button onclick="setTeams(32)" id="sz-32" class="py-4 rounded-lg border font-bold text-slate-700 border-slate-300 bg-white">32 Teams</button>
            </div>
            <div id="team-list" class="space-y-2"></div>
            <button onclick="startTourney()" class="w-full mt-6 bg-[#22a65a] text-white font-black py-4 rounded-lg uppercase shadow-lg tracking-wider">Start Tournament</button>
        </div>

        <div id="tab-groups" class="tournament-tab"><div id="match-list" class="space-y-6"></div></div>
        
        <div id="tab-rankings" class="tournament-tab">
            <div class="flex justify-between items-center mb-4 admin-only">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-left">Live Rankings</span>
                <div class="flex gap-2">
                    <button id="live-btn" onclick="startLive()" class="bg-[#1e2b4f] text-slate-100 text-[10px] font-bold px-4 py-2 rounded-lg uppercase">Go Live</button>
                    <button id="push-btn" onclick="save()" class="hidden bg-orange-500 text-white text-[10px] font-bold px-4 py-2 rounded-lg uppercase">Update All</button>
                </div>
            </div>
            <div id="tables-container" class="space-y-6"></div>
            <div id="wildcard-area" class="mt-8 hidden bg-amber-50 p-4 rounded-xl border border-amber-200 shadow-sm">
                <h3 class="font-black text-[10px] text-amber-600 mb-3 uppercase text-center">Best 3rd Place Runners-Up</h3>
                <div id="wildcard-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="tab-finals" class="tournament-tab"><div id="bracket-container" class="space-y-8"></div></div>
    </div>

    <script>
        let data = { size: 12, names: Array(12).fill(""), groups: [], scores: {}, ko: {}, room: null, timers: {}, courts: {}, startTime: null };
        let isGuest = false;
        const EVENT_DURATION = 3 * 60 * 60 * 1000;

        function setTeams(n) {
            data.size = n; data.names = Array(n).fill("");
            // Update active state visual style
            const sizes = [12, 16, 32];
            sizes.forEach(s => {
                const el = document.getElementById('sz-' + s);
                if (el) {
                    if (s == n) {
                        el.className = "py-4 rounded-lg border-2 font-bold text-slate-200 border-[#253256] bg-cc-active-tab";
                    } else {
                        el.className = "py-4 rounded-lg border font-bold text-slate-700 border-slate-300 bg-white";
                    }
                }
            });
            renderInputs();
        }

        function renderInputs() {
            const list = document.getElementById('team-list');
            // Stylized inputs matching attachment
            if(list) list.innerHTML = data.names.map((n, i) => `<input type="text" value="${n}" onchange="data.names[${i}]=this.value; save();" placeholder="Team ${i+1} Name" class="w-full p-4 border border-slate-200 rounded-lg font-medium text-slate-800 placeholder-slate-400 bg-white shadow-inner">`).join('');
        }

        function startTourney() {
            const n = data.size / 4;
            data.groups = []; data.scores = {}; data.ko = {}; data.timers = {}; data.courts = {}; data.startTime = Date.now();
            for (let i = 0; i < n; i++) data.groups.push(data.names.slice(i * 4, i * 4 + 4));
            showTab('groups');
            save();
        }

        function startLive() {
            if (!data.room) data.room = 'court_' + Math.random().toString(36).substr(2, 6);
            const shareableUrl = window.location.origin + window.location.pathname + '?room=' + data.room;
            navigator.clipboard.writeText(shareableUrl).then(() => {
                document.getElementById('live-indicator').classList.remove('hidden');
                document.getElementById('push-btn').classList.remove('hidden');
                document.getElementById('live-btn').innerText = "Copied!";
                save(); 
                alert("Tournament LIVE! Link copied.");
            });
        }

        async function save() {
            if (isGuest) return;
            localStorage.setItem('courtclub_v6', JSON.stringify(data));
            if (data.room) {
                fetch(`https://ntfy.sh/${data.room}`, { 
                    method: 'POST', 
                    body: JSON.stringify(data),
                    headers: { 'Cache-Control': 'no-cache' }
                }).catch(e => console.error("Cloud Error", e));
            }
            refresh();
        }

        async function initGuest(room) {
            isGuest = true;
            data.room = room;
            
            // UI Cleanup for Guest
            document.getElementById('live-indicator').classList.remove('hidden');
            document.getElementById('live-text').innerText = "Guest Mode";
            document.getElementById('sync-overlay').classList.remove('hidden');
            
            // Hide admin UI
            document.querySelectorAll('.admin-only').forEach(e => e.remove());

            const pollData = async () => {
                try {
                    const response = await fetch(`https://ntfy.sh/${room}/json?poll=1&t=` + Date.now());
                    const text = await response.text();
                    const lines = text.trim().split('\n');
                    for (let i = lines.length - 1; i >= 0; i--) {
                        if (!lines[i]) continue;
                        const msg = JSON.parse(lines[i]);
                        if (msg.message) {
                            const parsed = JSON.parse(msg.message);
                            if (parsed.groups && parsed.groups.length > 0) {
                                data = parsed;
                                document.getElementById('sync-overlay').classList.add('hidden');
                                showTab('rankings');
                                return true;
                            }
                        }
                    }
                } catch (e) { console.log("Poll Error", e); }
                return false;
            };

            await pollData();
            showTab('rankings');

            const es = new EventSource(`https://ntfy.sh/${room}/sse`);
            es.onmessage = (e) => {
                const p = JSON.parse(e.data);
                if (p.message) {
                    data = JSON.parse(p.message);
                    document.getElementById('sync-overlay').classList.add('hidden');
                    refresh();
                }
            };
        }

        function toggleTimer(id, mins) {
            if (isGuest) return;
            if (!data.timers[id]) data.timers[id] = { remaining: mins * 60, running: true };
            else data.timers[id].running = !data.timers[id].running;
            save();
        }

        function setCourt(id, val) { if(!isGuest) { data.courts[id] = val; save(); } }

        setInterval(() => {
            Object.keys(data.timers).forEach(id => {
                const t = data.timers[id];
                if (t.running && t.remaining > 0) {
                    t.remaining--;
                    const el = document.getElementById(`timer-${id}`);
                    if (el) { 
                        el.innerText = formatTime(t.remaining); 
                        el.className = "text-[11px] font-mono font-black " + (t.running ? "text-red-500 animate-pulse" : "text-slate-400");
                    }
                }
            });
            if (data.startTime) {
                const rem = Math.max(0, EVENT_DURATION - (Date.now() - data.startTime));
                const h = Math.floor(rem/3600000), m = Math.floor((rem%3600000)/60000), s = Math.floor((rem%60000)/1000);
                const clock = document.getElementById('global-countdown');
                if(clock) clock.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        }, 1000);

        function formatTime(sec) { return `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`; }

        function getMatchControlsHTML(id, mins) {
            const t = data.timers[id] || { remaining: mins * 60, running: false };
            const court = data.courts[id] || "";
            return `
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50">
                    <select onchange="setCourt('${id}', this.value)" ${isGuest?'disabled':''} class="text-[10px] font-black uppercase bg-slate-100 rounded px-1 py-1 outline-none">
                        <option value="">Court</option>
                        ${[1,2,3,4].map(c => `<option value="Court ${c}" ${court==='Court '+c?'selected':''}>Court ${c}</option>`).join('')}
                    </select>
                    <div class="flex items-center gap-2">
                        <span id="timer-${id}" class="text-[11px] font-mono font-black ${t.running ? 'text-red-500 animate-pulse' : 'text-slate-400'}">${formatTime(t.remaining)}</span>
                        ${!isGuest ? `<button onclick="toggleTimer('${id}', ${mins})" class="bg-[#1e2b4f] text-slate-100 px-2 py-1 rounded text-[9px] font-bold uppercase">${t.running ? 'Pause' : 'Start'}</button>` : ''}
                    </div>
                </div>`;
        }

        function updG(g, m, t, v) {
            if(isGuest) return;
            const k = `g${g}m${m}`; if (!data.scores[k]) data.scores[k] = ["", ""];
            data.scores[k][t] = v === "" ? "" : parseInt(v); save();
        }

        function updK(id, tIdx, v) {
            if(isGuest) return;
            if (!data.ko[id]) data.ko[id] = ["", ""];
            data.ko[id][tIdx] = v === "" ? "" : parseInt(v); save();
        }

        function refresh() {
            if (!data.groups || !data.groups.length) return;
            let gStats = data.groups.map((g, i) => {
                let s = g.map(name => ({ name, p: 0, gd: 0 }));
                const pairs = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
                pairs.forEach((p, m) => {
                    const sc = data.scores[`g${i}m${m}`];
                    if (sc && sc[0] !== "" && sc[1] !== "") {
                        s[p[0]].gd += (sc[0] - sc[1]); s[p[1]].gd += (sc[1] - sc[0]);
                        if (sc[0] > sc[1]) s[p[0]].p += 3; else if (sc[1] > sc[0]) s[p[1]].p += 3; else { s[p[0]].p += 1; s[p[1]].p += 1; }
                    }
                });
                return s.sort((a, b) => b.p - a.p || b.gd - a.gd);
            });

            document.getElementById('tables-container').innerHTML = gStats.map((s, i) => `
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-black text-[10px] text-brand-dark mb-2 uppercase">Group ${String.fromCharCode(65 + i)}</h3>
                    <table class="w-full text-xs">
                        ${s.map((t, idx) => `<tr class="${idx < 2 ? 'qualifying-row' : ''}">
                            <td class="py-2 px-2 rounded-l-lg">${t.name || '---'}</td>
                            <td class="text-right py-2 px-2 rounded-r-lg">${t.p}pts (${t.gd})</td>
                        </tr>`).join('')}
                    </table>
                </div>`).join('');

            const gPairs = [[0, 1], [2, 3], [0, 2], [1, 3], [0, 3], [1, 2]];
            document.getElementById('match-list').innerHTML = data.groups.map((g, gi) => `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="bg-cc-dark text-white px-4 py-2 text-[10px] font-black uppercase">Group ${String.fromCharCode(65 + gi)}</div>
                    ${gPairs.map((p, mi) => {
                        const mid = `g${gi}m${mi}`, s = data.scores[mid] || ["", ""];
                        return `<div class="p-3 border-b last:border-0">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold w-20 truncate">${g[p[0]] || 'TBD'}</span>
                                <div class="flex gap-1">
                                    <input type="number" ${isGuest?'disabled':''} value="${s[0]}" oninput="updG(${gi},${mi},0,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                    <input type="number" ${isGuest?'disabled':''} value="${s[1]}" oninput="updG(${gi},${mi},1,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                </div>
                                <span class="text-xs font-bold w-20 text-right truncate">${g[p[1]] || 'TBD'}</span>
                            </div>
                            ${getMatchControlsHTML(mid, 20)}
                        </div>`
                    }).join('')}
                </div>`).join('');

            let qual = gStats.flatMap(s => [s[0].name, s[1].name]);
            if (data.size == 12) {
                let thirds = gStats.map((s, i) => ({ ...s[2], grp: String.fromCharCode(65 + i) })).sort((a, b) => b.p - a.p || b.gd - a.gd);
                qual = [gStats[0][0].name, gStats[1][0].name, gStats[2][0].name, gStats[0][1].name, gStats[1][1].name, gStats[2][1].name, (thirds[0] || {}).name, (thirds[1] || {}).name];
                document.getElementById('wildcard-area').classList.remove('hidden');
                document.getElementById('wildcard-list').innerHTML = thirds.map((t, i) => `
                    <div class="flex justify-between items-center text-[11px] p-2 ${i < 2 ? 'wildcard-row rounded-lg' : ''} font-bold">
                        <span>Group ${t.grp}: ${t.name || '---'}</span>
                        <span>${t.p}pts (${t.gd})</span>
                    </div>`).join('');
            }

            const wins = {};
            const matchHTML = (id, t1, t2, label, time) => {
                const s = data.ko[id] || ["", ""], w = (s[0] !== "" && s[1] !== "" && s[0] !== s[1]) ? (s[0] > s[1] ? t1 : t2) : null;
                wins[id] = w;
                return `
                <div class="mb-4">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1 ml-1">${label}</p>
                    <div class="bg-white p-3 rounded-xl border shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="text-[11px] font-bold truncate w-24 ${w == t1 ? 'text-orange-500' : ''}">${t1 || 'TBD'}</span>
                            <div class="flex gap-1">
                                <input type="number" ${isGuest?'disabled':''} value="${s[0]}" oninput="updK('${id}',0,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                <input type="number" ${isGuest?'disabled':''} value="${s[1]}" oninput="updK('${id}',1,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                            </div>
                            <span class="text-[11px] font-bold text-right truncate w-24 ${w == t2 ? 'text-orange-500' : ''}">${t2 || 'TBD'}</span>
                        </div>
                        ${getMatchControlsHTML(id, time)}
                    </div>
                </div>`;
            };

            let bh = `<p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Quarter Finals</p>`;
            bh += matchHTML("QF1", qual[0], qual[7], "QF 1", 20) + matchHTML("QF2", qual[1], qual[6], "QF 2", 20) +
                  matchHTML("QF3", qual[2], qual[5], "QF 3", 20) + matchHTML("QF4", qual[3], qual[4], "QF 4", 20);
            bh += `<div class="h-px bg-slate-200 my-6"></div><p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Semi Finals</p>`;
            bh += matchHTML("SF1", wins.QF1, wins.QF4, "Semi 1", 30) + matchHTML("SF2", wins.QF2, wins.QF3, "Semi 2", 30);
            bh += `<div class="py-4 border-t-2 border-orange-200 mt-6"><p class="text-center text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4">Championship</p></div>`;
            bh += matchHTML("F", wins.SF1, wins.SF2, "Finals", 30);
            document.getElementById('bracket-container').innerHTML = bh;
        }

        function showTab(id) {
            document.querySelectorAll('.tournament-tab').forEach(t => t.classList.remove('active'));
            const target = document.getElementById('tab-' + id);
            if(target) target.classList.add('active');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab-btn'));
            const btn = document.getElementById('btn-' + id);
            if(btn) btn.classList.add('active-tab-btn');
            
            refresh();
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomID = urlParams.get('room');
            const saved = localStorage.getItem('courtclub_v6');
            
            if (roomID) {
                initGuest(roomID);
            } else {
                if (saved) data = JSON.parse(saved);
                setTeams(data.size);
                if (data.groups.length > 0) {
                    showTab('groups');
                } else {
                    showTab('setup');
                }
                if (data.room) {
                    document.getElementById('live-indicator').classList.remove('hidden');
                    document.getElementById('push-btn').classList.remove('hidden');
                }
            }
        };
    </script>
</body>
</html>
