<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Pro: Full Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes flash { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
        .animate-champion { animation: flash 0.8s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-20 overflow-x-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-indigo-950 z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-6">
                <div class="text-4xl mb-2">🎾</div>
                <h1 class="text-2xl font-bold">Padel Pro</h1>
                <p class="text-slate-500 text-sm">Sign in to manage your tournament</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-4 bg-slate-100 rounded-xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-xl outline-none">
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-xl">Login</button>
                    <button onclick="handleAuth('register')" class="flex-1 bg-slate-800 text-white font-bold py-4 rounded-xl">Register</button>
                </div>
            </div>
            <p id="auth-msg" class="text-center text-red-500 mt-4 text-sm"></p>
        </div>
    </div>

    <header class="bg-indigo-950 text-white p-5 sticky top-0 z-30">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-bold">Padel <span class="text-amber-400">Pro</span></h1>
            <div class="flex items-center gap-3">
                <span id="user-display" class="text-[10px] uppercase font-bold bg-indigo-900 px-2 py-1 rounded"></span>
                <button onclick="logout()" class="text-xs bg-slate-800 px-2 py-1 rounded">Logout</button>
            </div>
        </div>
    </header>

    <nav class="flex bg-white border-b sticky top-[68px] z-30 overflow-x-auto">
        <button onclick="showTab('setup')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-setup">Teams</button>
        <button onclick="showTab('groups')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-groups">Scores</button>
        <button onclick="showTab('rankings')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-rankings">Table</button>
        <button onclick="showTab('knockouts')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-knockouts">Finals</button>
        <button onclick="showTab('history')" class="flex-none px-6 py-3 text-sm font-bold border-b-2 border-transparent" id="tab-history">History</button>
        <button onclick="showTab('winner')" class="flex-none px-6 py-3 text-lg font-bold border-b-2 border-transparent hidden text-amber-500" id="tab-winner">🏆</button>
    </nav>

    <main class="p-4 max-w-md mx-auto">
        <section id="setup" class="tab-content active">
            <h2 class="font-bold text-lg mb-4">Tournament Setup</h2>
            <div id="team-inputs" class="grid grid-cols-1 gap-2"></div>
            <button onclick="generateTournament()" class="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg">Start Tournament</button>
        </section>

        <section id="groups" class="tab-content"><div id="group-schedule" class="space-y-6"></div></section>
        
        <section id="rankings" class="tab-content">
            <h2 class="font-bold text-lg mb-4">Group Standings</h2>
            <div id="leaderboard-container" class="space-y-6"></div>
            <div id="wildcard-list" class="mt-6 bg-amber-50 p-4 rounded-xl border border-amber-200"></div>
        </section>

        <section id="knockouts" class="tab-content">
            <div id="qf-bracket" class="space-y-3 mb-8"></div>
            <div id="sf-bracket" class="space-y-3 mb-8"></div>
            <div id="f-bracket" class="space-y-3"></div>
            <div id="archive-button-container" class="mt-10 hidden">
                <button onclick="archiveTournament()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-xl">SAVE & ARCHIVE TO HISTORY</button>
            </div>
        </section>

        <section id="history" class="tab-content">
            <h2 class="font-bold text-lg mb-4">Saved History</h2>
            <div id="history-list" class="space-y-3"></div>
        </section>

        <section id="winner" class="tab-content text-center pt-20">
            <div class="text-6xl mb-4">🏆</div>
            <div id="champion-name-display" class="text-4xl font-black text-amber-500 animate-champion uppercase"></div>
            <p class="text-slate-400 mt-4 font-bold text-sm">CHAMPION</p>
        </section>
    </main>

    <script>
        let currentUser = null;
        let activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };

        const getDB = () => JSON.parse(localStorage.getItem('padelDB')) || {};
        const saveDB = (data) => localStorage.setItem('padelDB', JSON.stringify(data));

        function handleAuth(type) {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const db = getDB();
            if(!u || !p) return;
            if(type === 'register') {
                if(db[u]) { alert("User exists"); return; }
                db[u] = { password: p, history: [], active: activeData };
                saveDB(db);
            }
            if(db[u] && db[u].password === p) {
                currentUser = u;
                localStorage.setItem('padelSession', u);
                login();
            } else { alert("Invalid login"); }
        }

        function login() {
            const db = getDB();
            activeData = db[currentUser].active;
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = currentUser;
            initInputs();
            if(activeData.generated) renderMatches();
            refreshUI();
            showTab('setup');
        }

        function logout() { localStorage.removeItem('padelSession'); location.reload(); }

        function sync() {
            if(!currentUser) return;
            const db = getDB();
            db[currentUser].active = activeData;
            saveDB(db);
        }

        function initInputs() {
            const cont = document.getElementById('team-inputs'); cont.innerHTML = "";
            activeData.teams.forEach((t, i) => {
                cont.innerHTML += `<input type="text" value="${t}" onchange="activeData.teams[${i}]=this.value;sync()" placeholder="Team ${i+1}" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-indigo-500">`;
            });
        }

        function generateTournament() {
            activeData.groups = [activeData.teams.slice(0,4), activeData.teams.slice(4,8), activeData.teams.slice(8,12)];
            activeData.generated = true; activeData.groupScores = {}; activeData.koScores = {}; activeData.finalWinner = null;
            sync(); renderMatches(); showTab('groups');
        }

        function renderMatches() {
            const cont = document.getElementById('group-schedule'); cont.innerHTML = "";
            const pairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            activeData.groups.forEach((g, gIdx) => {
                let h = `<div class="bg-white rounded-2xl shadow-sm border overflow-hidden mb-4"><div class="bg-indigo-900 text-white px-4 py-2 text-xs font-bold uppercase">Group ${String.fromCharCode(65+gIdx)}</div>`;
                pairs.forEach((p, mIdx) => {
                    const s = activeData.groupScores[`g${gIdx}m${mIdx}`] || ["", ""];
                    h += `<div class="flex items-center justify-between p-3 border-b last:border-0"><span class="text-[11px] font-bold w-20 truncate">${g[p[0]]||'TBD'}</span><div class="flex gap-1"><input type="number" value="${s[0]}" onchange="updateGS(${gIdx},${mIdx},0,this.value)" class="w-10 h-10 text-center bg-slate-50 rounded-lg font-bold"><input type="number" value="${s[1]}" onchange="updateGS(${gIdx},${mIdx},1,this.value)" class="w-10 h-10 text-center bg-slate-50 rounded-lg font-bold"></div><span class="text-[11px] font-bold w-20 text-right truncate">${g[p[1]]||'TBD'}</span></div>`;
                });
                cont.innerHTML += h + `</div>`;
            });
        }

        function updateGS(g, m, t, v) {
            const k = `g${g}m${m}`; if(!activeData.groupScores[k]) activeData.groupScores[k] = ["",""];
            activeData.groupScores[k][t] = v === "" ? "" : parseInt(v); sync(); refreshUI();
        }

        function refreshUI() {
            const res = calculate();
            renderTables(res);
            renderBracket(res.qual);
            renderHistory();
        }

        function calculate() {
            let gStats = []; let thirds = [];
            activeData.groups.forEach((g, i) => {
                let stats = g.map(name => ({ name, p: 0, gd: 0 }));
                [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]].forEach((p, m) => {
                    const s = activeData.groupScores[`g${i}m${m}`];
                    if(s && s[0] !== "" && s[1] !== "") {
                        stats[p[0]].gd += (s[0]-s[1]); stats[p[1]].gd += (s[1]-s[0]);
                        if(s[0]>s[1]) stats[p[0]].p += 2; else if(s[1]>s[0]) stats[p[1]].p += 2;
                    }
                });
                stats.sort((a,b) => b.p - a.p || b.gd - a.gd);
                gStats.push(stats); 
                thirds.push({...stats[2], groupName: String.fromCharCode(65+i)});
            });
            thirds.sort((a,b) => b.p - a.p || b.gd - a.gd);
            const wc = thirds.slice(0,2);
            return { gStats, wc, qual: { 
                QF1: [gStats[0][0].name, wc[1].name], QF2: [gStats[1][0].name, wc[0].name], 
                QF3: [gStats[2][0].name, gStats[0][1].name], QF4: [gStats[1][1].name, gStats[2][1].name] 
            }};
        }

        // --- FIX: UPDATED RENDER TABLES TO INCLUDE WILDCARDS ---
        function renderTables(res) {
            const cont = document.getElementById('leaderboard-container'); cont.innerHTML = "";
            res.gStats.forEach((s, i) => {
                let h = `<div class="bg-white p-4 rounded-xl shadow-sm border"><h3 class="font-bold text-xs text-indigo-600 mb-2 uppercase">Group ${String.fromCharCode(65+i)}</h3><table class="w-full text-xs">`;
                s.forEach((t, idx) => {
                    const isQualified = idx < 2; // Top 2 always qualify
                    h += `<tr class="${isQualified ? 'font-bold text-green-600' : ''}"><td class="py-1">${t.name || '---'}</td><td class="text-right">${t.p}pts (${t.gd > 0 ? '+':''}${t.gd})</td></tr>`;
                });
                cont.innerHTML += h + `</table></div>`;
            });

            // Populate Wildcard box
            const wcCont = document.getElementById('wildcard-list');
            wcCont.innerHTML = `<h3 class="font-black text-[10px] text-amber-600 mb-2 uppercase tracking-widest">Qualified Runners Up (Best 3rd)</h3>`;
            res.wc.forEach((w, i) => {
                wcCont.innerHTML += `
                <div class="flex justify-between items-center py-1 border-b border-amber-100 last:border-0">
                    <span class="text-xs font-bold text-amber-900">${i+1}. ${w.name || 'TBD'} (Group ${w.groupName})</span>
                    <span class="text-xs font-black text-amber-600">${w.p}pts</span>
                </div>`;
            });
        }

        function renderBracket(qual) {
            const wins = {};
            const renderM = (id, t1, t2, contId) => {
                const s = activeData.koScores[id] || ["",""];
                const w = (t1 && t2 && s[0] !== "" && s[1] !== "") ? (s[0]>s[1]?t1:t2) : null;
                wins[id] = w;
                document.getElementById(contId).innerHTML += `<div class="bg-white p-3 rounded-xl border flex items-center justify-between shadow-sm"><span class="text-[10px] font-bold w-16 truncate ${w==t1?'text-green-600':''}">${t1||'TBD'}</span><div class="flex gap-1"><input type="number" value="${s[0]}" onchange="updateKS('${id}',0,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-xs"><input type="number" value="${s[1]}" onchange="updateKS('${id}',1,this.value)" class="w-8 h-8 text-center bg-slate-50 border rounded font-bold text-xs"></div><span class="text-[10px] font-bold w-16 text-right truncate ${w==t2?'text-green-600':''}">${t2||'TBD'}</span></div>`;
            };
            document.getElementById('qf-bracket').innerHTML = `<p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Quarter-Finals</p>`;
            renderM("QF1", qual.QF1[0], qual.QF1[1], 'qf-bracket'); renderM("QF2", qual.QF2[0], qual.QF2[1], 'qf-bracket');
            renderM("QF3", qual.QF3[0], qual.QF3[1], 'qf-bracket'); renderM("QF4", qual.QF4[0], qual.QF4[1], 'qf-bracket');
            document.getElementById('sf-bracket').innerHTML = `<p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Semi-Finals</p>`;
            renderM("SF1", wins.QF1, wins.QF4, 'sf-bracket'); renderM("SF2", wins.QF2, wins.QF3, 'sf-bracket');
            document.getElementById('f-bracket').innerHTML = `<p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Grand Final</p>`;
            renderM("F", wins.SF1, wins.SF2, 'f-bracket');
            
            if(wins.F) {
                activeData.finalWinner = wins.F;
                document.getElementById('archive-button-container').classList.remove('hidden');
                document.getElementById('champion-name-display').innerText = wins.F;
                document.getElementById('tab-winner').classList.remove('hidden');
            } else {
                document.getElementById('archive-button-container').classList.add('hidden');
                document.getElementById('tab-winner').classList.add('hidden');
            }
        }

        function updateKS(id, t, v) {
            if(!activeData.koScores[id]) activeData.koScores[id] = ["",""];
            activeData.koScores[id][t] = v === "" ? "" : parseInt(v); sync(); refreshUI();
        }

        function archiveTournament() {
            if(!activeData.finalWinner) return;
            if(!confirm("Archive and reset the board?")) return;
            const db = getDB();
            const archiveEntry = {
                id: Date.now(),
                date: new Date().toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}),
                winner: activeData.finalWinner,
                data: JSON.parse(JSON.stringify(activeData))
            };
            if(!db[currentUser].history) db[currentUser].history = [];
            db[currentUser].history.unshift(archiveEntry);
            activeData = { teams: Array(12).fill(""), groups: [], groupScores: {}, koScores: {}, finalWinner: null, generated: false };
            db[currentUser].active = activeData;
            saveDB(db);
            initInputs(); renderMatches(); refreshUI(); showTab('history');
        }

        function renderHistory() {
            const db = getDB();
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            if(!currentUser || !db[currentUser].history || db[currentUser].history.length === 0) {
                list.innerHTML = `<div class="text-center py-10 bg-white rounded-xl border border-dashed border-slate-300"><p class="text-slate-400 text-sm">No saved history.</p></div>`;
                return;
            }
            db[currentUser].history.forEach(h => {
                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-xl border shadow-sm flex justify-between items-center";
                item.innerHTML = `<div onclick="viewHistory(${h.id})" class="flex-1 cursor-pointer"><p class="text-[10px] font-black text-slate-400 uppercase">${h.date}</p><p class="font-bold text-slate-800">Winner: ${h.winner}</p></div><button onclick="deleteHistory(${h.id})" class="text-xs text-red-400 font-bold p-2">Delete</button>`;
                list.appendChild(item);
            });
        }

        function viewHistory(id) {
            const db = getDB();
            const entry = db[currentUser].history.find(x => x.id === id);
            activeData = JSON.parse(JSON.stringify(entry.data));
            refreshUI(); showTab('knockouts');
        }

        function deleteHistory(id) {
            if(!confirm("Delete forever?")) return;
            const db = getDB();
            db[currentUser].history = db[currentUser].history.filter(x => x.id !== id);
            saveDB(db); renderHistory();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600', 'border-amber-500'));
            const btn = document.getElementById('tab-'+id);
            if(id === 'winner') btn.classList.add('border-amber-500');
            else btn.classList.add('border-indigo-600', 'text-indigo-600');
            if(id === 'history') renderHistory();
            if(id === 'rankings') refreshUI();
        }

        window.onload = () => {
            const session = localStorage.getItem('padelSession');
            const db = getDB();
            if(session && db[session]) { currentUser = session; login(); }
            else { document.getElementById('auth-overlay').classList.remove('hidden'); }
        };
    </script>
</body>
</html>
