<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>The Court Club | Live Tournament</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tournament-tab { display: none; }
        .tournament-tab.active { display: block; }
        input, select { font-size: 16px !important; touch-action: manipulation; }
        .active-tab-btn { border-bottom: 3px solid #fb923c; color: #fb923c; }
        .read-only input, .read-only select { pointer-events: none; background: #f1f5f9; border: none; appearance: none; }
        .qualifying-row { background-color: #f0fdf4; font-weight: 800; color: #166534; }
        .wildcard-row { background-color: #fffbeb; font-weight: 800; color: #92400e; }
        .pulse { animation: pulse 2s infinite; }
        .timer-running { color: #ef4444; font-weight: 900; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-indigo-950 text-white px-4 py-3 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="font-black text-xl tracking-tighter uppercase text-orange-200">The Court Club</span>
        </div>
        <div id="live-indicator" class="hidden flex items-center gap-2 bg-red-600 px-2 py-1 rounded text-[10px] font-black uppercase">
            <span class="w-2 h-2 bg-white rounded-full pulse"></span> Live
        </div>
    </header>

    <nav id="main-nav" class="flex bg-white border-b sticky top-0 z-30 shadow-sm">
        <button onclick="showTab('setup')" id="btn-setup" class="flex-1 py-4 text-[10px] font-black uppercase admin-only">Setup</button>
        <button onclick="showTab('groups')" id="btn-groups" class="flex-1 py-4 text-[10px] font-black uppercase">Scores</button>
        <button onclick="showTab('rankings')" id="btn-rankings" class="flex-1 py-4 text-[10px] font-black uppercase">Standings</button>
        <button onclick="showTab('finals')" id="btn-finals" class="flex-1 py-4 text-[10px] font-black uppercase">Finals</button>
    </nav>

    <div class="p-4 max-w-md mx-auto pb-20">
        <div id="sync-msg" class="hidden text-center py-10">
            <i class="fa-solid fa-rotate text-orange-400 text-3xl mb-4 animate-spin"></i>
            <p class="font-black text-slate-400 uppercase text-[10px] tracking-widest">Syncing Live Data...</p>
        </div>

        <div id="tab-setup" class="tournament-tab active">
            <div class="grid grid-cols-3 gap-2 mb-6">
                <button onclick="setTeams(12)" id="sz-12" class="py-3 rounded-xl border-2 font-bold text-orange-700 border-orange-400 bg-orange-50">12 Teams</button>
                <button onclick="setTeams(16)" id="sz-16" class="py-3 rounded-xl border-2 font-bold text-slate-400 border-slate-200">16 Teams</button>
                <button onclick="setTeams(32)" id="sz-32" class="py-3 rounded-xl border-2 font-bold text-slate-400 border-slate-200">32 Teams</button>
            </div>
            <div id="team-list" class="space-y-2"></div>
            <button onclick="startTourney()" class="w-full mt-6 bg-green-600 text-white font-black py-4 rounded-xl uppercase shadow-lg">Start Tournament</button>
        </div>

        <div id="tab-groups" class="tournament-tab">
            <div id="match-list" class="space-y-6"></div>
        </div>

        <div id="tab-rankings" class="tournament-tab">
            <div class="flex justify-between items-center mb-4 admin-only">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Live Rankings</span>
                <button id="live-btn" onclick="startLive()" class="bg-indigo-600 text-white text-[10px] font-bold px-4 py-2 rounded-lg uppercase">Go Live & Share</button>
            </div>
            <div id="tables-container" class="space-y-6"></div>
            <div id="wildcard-area" class="mt-8 hidden bg-amber-50 p-4 rounded-xl border border-amber-200 shadow-sm">
                <h3 class="font-black text-[10px] text-amber-600 mb-3 uppercase text-center">Best 3rd Place Runners-Up</h3>
                <div id="wildcard-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="tab-finals" class="tournament-tab">
            <div id="bracket-container" class="space-y-8"></div>
        </div>
    </div>

    <script>
        let data = { size: 12, names: Array(12).fill(""), groups: [], scores: {}, ko: {}, room: null, timers: {}, courts: {} };
        let isGuest = false;

        function setTeams(n) {
            data.size = n; data.names = Array(n).fill("");
            [12,16,32].forEach(s => {
                const el = document.getElementById('sz-'+s);
                if(el) el.className = (s==n) ? "py-3 rounded-xl border-2 font-bold text-orange-700 border-orange-400 bg-orange-50" : "py-3 rounded-xl border-2 font-bold text-slate-400 border-slate-200";
            });
            renderInputs();
        }

        function renderInputs() {
            document.getElementById('team-list').innerHTML = data.names.map((n, i) => `<input type="text" value="${n}" onchange="data.names[${i}]=this.value; save();" placeholder="Team ${i+1}" class="w-full p-3 border rounded-xl font-bold">`).join('');
        }

        function startTourney() {
            const n = data.size / 4;
            data.groups = []; data.scores = {}; data.ko = {}; data.timers = {}; data.courts = {};
            for(let i=0; i<n; i++) data.groups.push(data.names.slice(i*4, i*4+4));
            showTab('groups');
            save();
        }

        function startLive() {
            if(!data.room) data.room = 'courtclub_' + Math.random().toString(36).substr(2, 9);
            const shareableUrl = window.location.href.split('?')[0] + '?room=' + data.room;
            navigator.clipboard.writeText(shareableUrl);
            document.getElementById('live-indicator').classList.remove('hidden');
            document.getElementById('live-btn').innerText = "Link Copied!";
            listenForJoinRequests();
            alert("LIVE ACTIVE! Share link copied.");
            save(); 
        }

        async function save() {
            const focusedId = document.activeElement ? document.activeElement.id : null;
            localStorage.setItem('courtclub_v6', JSON.stringify(data));
            if(data.room && !isGuest) {
                fetch(`https://ntfy.sh/${data.room}`, { method: 'POST', body: JSON.stringify(data) }).catch(e => {});
            }
            refresh();
            if (focusedId) {
                const el = document.getElementById(focusedId);
                if (el) { el.focus(); if (el.setSelectionRange) el.setSelectionRange(el.value.length, el.value.length); }
            }
        }

        function listenForJoinRequests() {
            const joinSource = new EventSource(`https://ntfy.sh/${data.room}_join/sse`);
            joinSource.onmessage = () => { save(); };
        }

        function listenForUpdates(room) {
            document.getElementById('sync-msg').classList.remove('hidden');
            fetch(`https://ntfy.sh/${room}_join`, { method: 'POST', body: 'join' });
            const eventSource = new EventSource(`https://ntfy.sh/${room}/sse`);
            eventSource.onmessage = (e) => {
                try {
                    const payload = JSON.parse(e.data);
                    if(payload.message) {
                        data = JSON.parse(payload.message);
                        localStorage.setItem('courtclub_v6', JSON.stringify(data));
                        document.getElementById('sync-msg').classList.add('hidden');
                        refresh();
                    }
                } catch(err) { }
            };
        }

        function toggleTimer(id, mins) {
            if (isGuest) return;
            if (!data.timers[id]) {
                data.timers[id] = { remaining: mins * 60, running: true };
            } else {
                data.timers[id].running = !data.timers[id].running;
            }
            save();
        }

        function setCourt(id, val) {
            data.courts[id] = val;
            save();
        }

        setInterval(() => {
            let changed = false;
            Object.keys(data.timers).forEach(id => {
                const t = data.timers[id];
                if (t.running && t.remaining > 0) {
                    t.remaining--;
                    changed = true;
                    const el = document.getElementById(`timer-${id}`);
                    if (el) el.innerText = formatTime(t.remaining);
                }
            });
            if (changed && !isGuest && new Date().getSeconds() % 10 === 0) save();
        }, 1000);

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function getMatchControlsHTML(id, mins) {
            const t = data.timers[id] || { remaining: mins * 60, running: false };
            const court = data.courts[id] || "";
            return `
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-50">
                    <select onchange="setCourt('${id}', this.value)" class="text-[9px] font-black uppercase bg-slate-100 rounded px-1 py-1 outline-none">
                        <option value="">Select Court</option>
                        <option value="Court 1" ${court==='Court 1'?'selected':''}>Court 1</option>
                        <option value="Court 2" ${court==='Court 2'?'selected':''}>Court 2</option>
                        <option value="Court 3" ${court==='Court 3'?'selected':''}>Court 3</option>
                        <option value="Court 4" ${court==='Court 4'?'selected':''}>Court 4</option>
                    </select>
                    
                    <div class="flex items-center gap-2">
                        <span id="timer-${id}" class="text-[11px] font-mono font-black ${t.running ? 'timer-running' : 'text-slate-400'}">
                            ${formatTime(t.remaining)}
                        </span>
                        <button onclick="toggleTimer('${id}', ${mins})" class="admin-only bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-[9px] font-bold uppercase">
                            ${t.running ? 'Pause' : 'Start'}
                        </button>
                    </div>
                </div>`;
        }

        function updG(g,m,t,v) { 
            const k = `g${g}m${m}`; if(!data.scores[k]) data.scores[k]=["",""]; 
            data.scores[k][t] = v===""?"":parseInt(v); save(); 
        }

        function updK(id, tIdx, v) {
            if(!data.ko[id]) data.ko[id] = ["", ""];
            data.ko[id][tIdx] = v==="" ? "" : parseInt(v); save();
        }

        function refresh() {
            if(!data.groups || !data.groups.length) return;
            
            let gStats = data.groups.map((g, i) => {
                let s = g.map(name => ({ name, p: 0, gd: 0 }));
                const pairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
                pairs.forEach((p, m) => {
                    const sc = data.scores[`g${i}m${m}`];
                    if(sc && sc[0] !== "" && sc[1] !== "") {
                        s[p[0]].gd += (sc[0]-sc[1]); s[p[1]].gd += (sc[1]-sc[0]);
                        if(sc[0]>sc[1]) s[p[0]].p += 3; else if(sc[1]>sc[0]) s[p[1]].p += 3; else { s[p[0]].p += 1; s[p[1]].p += 1; }
                    }
                });
                return s.sort((a,b) => b.p - a.p || b.gd - a.gd);
            });

            document.getElementById('tables-container').innerHTML = gStats.map((s, i) => `
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-black text-[10px] text-indigo-900 mb-2 uppercase">Group ${String.fromCharCode(65+i)}</h3>
                    <table class="w-full text-xs">
                        ${s.map((t, idx) => `<tr class="${idx<2?'qualifying-row':''}">
                            <td class="py-2 px-2 rounded-l-lg">${t.name || '---'}</td>
                            <td class="text-right py-2 px-2 rounded-r-lg">${t.p}pts (${t.gd})</td>
                        </tr>`).join('')}
                    </table>
                </div>`).join('');

            const gPairs = [[0,1], [2,3], [0,2], [1,3], [0,3], [1,2]];
            document.getElementById('match-list').innerHTML = data.groups.map((g, gi) => `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="bg-indigo-900 text-white px-4 py-2 text-[10px] font-black uppercase">Group ${String.fromCharCode(65+gi)}</div>
                    ${gPairs.map((p, mi) => {
                        const mid = `g${gi}m${mi}`;
                        const s = data.scores[mid] || ["",""];
                        return `<div class="p-3 border-b last:border-0">
                            <div class="flex items-center justify-between">
                                <span class="text-xs font-bold w-20 truncate">${g[p[0]]||'TBD'}</span>
                                <div class="flex gap-1">
                                    <input type="number" value="${s[0]}" oninput="updG(${gi},${mi},0,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                    <input type="number" value="${s[1]}" oninput="updG(${gi},${mi},1,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                </div>
                                <span class="text-xs font-bold w-20 text-right truncate">${g[p[1]]||'TBD'}</span>
                            </div>
                            ${getMatchControlsHTML(mid, 20)}
                        </div>`
                    }).join('')}
                </div>`).join('');

            let qual = data.size == 12 ? [] : gStats.flatMap(s => [s[0].name, s[1].name]);
            if(data.size == 12) {
                let thirds = gStats.map((s, i) => ({...s[2], grp: String.fromCharCode(65+i)})).sort((a,b) => b.p - a.p || b.gd - a.gd);
                qual = [gStats[0][0].name, gStats[1][0].name, gStats[2][0].name, gStats[0][1].name, gStats[1][1].name, gStats[2][1].name, (thirds[0]||{}).name, (thirds[1]||{}).name];
            }

            const wins = {};
            const matchHTML = (id, t1, t2, label, time) => {
                const s = data.ko[id] || ["", ""];
                const w = (s[0]!=="" && s[1]!=="" && s[0]!==s[1]) ? (s[0]>s[1]?t1:t2) : null;
                wins[id] = w;
                return `
                <div class="mb-4">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1 ml-1">${label}</p>
                    <div class="bg-white p-3 rounded-xl border shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="text-[11px] font-bold truncate w-24 ${w==t1?'text-orange-500':''}">${t1||'TBD'}</span>
                            <div class="flex gap-1">
                                <input type="number" value="${s[0]}" oninput="updK('${id}',0,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                                <input type="number" value="${s[1]}" oninput="updK('${id}',1,this.value)" class="w-10 h-10 text-center bg-slate-50 border rounded-lg font-bold">
                            </div>
                            <span class="text-[11px] font-bold text-right truncate w-24 ${w==t2?'text-orange-500':''}">${t2||'TBD'}</span>
                        </div>
                        ${getMatchControlsHTML(id, time)}
                    </div>
                </div>`;
            };

            let bh = `<p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Quarter Finals</p>`;
            bh += matchHTML("QF1", qual[0], qual[7], "QF 1", 20) + matchHTML("QF2", qual[1], qual[6], "QF 2", 20) +
                  matchHTML("QF3", qual[2], qual[5], "QF 3", 20) + matchHTML("QF4", qual[3], qual[4], "QF 4", 20);
            bh += `<div class="h-px bg-slate-200 my-6"></div><p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Semi Finals</p>`;
            bh += matchHTML("SF1", wins.QF1, wins.QF4, "Semi 1", 30) + matchHTML("SF2", wins.QF2, wins.QF3, "Semi 2", 30);
            bh += `<div class="py-4 border-t-2 border-orange-200 mt-6"><p class="text-center text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4">Championship</p></div>`;
            bh += matchHTML("F", wins.SF1, wins.SF2, "Finals", 30);
            
            document.getElementById('bracket-container').innerHTML = bh;
            if(isGuest) {
                document.querySelectorAll('input, select').forEach(i => i.disabled = true);
                document.querySelectorAll('.admin-only').forEach(e => e.remove());
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tournament-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab-btn'));
            document.getElementById('btn-'+id).classList.add('active-tab-btn');
            refresh();
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const roomID = urlParams.get('room');
            const saved = localStorage.getItem('courtclub_v6');
            if(saved) data = JSON.parse(saved);

            if(roomID) {
                isGuest = true;
                data.room = roomID;
                document.body.classList.add('read-only');
                document.querySelectorAll('.admin-only').forEach(e => e.remove());
                document.getElementById('live-indicator').classList.remove('hidden');
                listenForUpdates(roomID);
                showTab('rankings');
            } else {
                setTeams(data.size);
                if(data.groups.length) { 
                    showTab('groups');
                    if(data.room) {
                        document.getElementById('live-indicator').classList.remove('hidden');
                        listenForJoinRequests();
                    }
                }
            }
        };
    </script>
</body>
</html>
